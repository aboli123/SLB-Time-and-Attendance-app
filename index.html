<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0014DC">
<title>SLB · Time &amp; Leave Tracking — Employee App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#0014DC;
    --brand-dark:#00096E;
    --brand-tint:#E7E9FC;
    --accent:#FF7A45;
    --accent-tint:#FFEDE3;
    --bg:#F4F6F5;
    --card:#FFFFFF;
    --border:#E7EBE9;
    --text:#1E2A26;
    --text-2:#5C6B65;
    --text-3:#93A19B;
    --positive:#1E8A4C;
    --positive-bg:#E5F6EC;
    --critical:#C77700;
    --critical-bg:#FFF2DE;
    --neutral:#93A19B;
    --negative:#D14343;
    --negative-bg:#FCEAEA;
    --info-dot:#3D8BFF;
    --manual:#8A4FD1;
    --manual-bg:#F2E9FB;
    --mgr:#0E7C86;
    --mgr-bg:#DDF3F4;
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:24px;
    --shadow-1:0 1px 3px rgba(30,42,38,.07), 0 1px 1px rgba(30,42,38,.05);
    --shadow-2:0 10px 28px rgba(30,42,38,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Poppins','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#EEF2F0 0%,#DCE5E0 100%);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 32px;
    color:var(--text);
  }
  .rig-label{ text-align:center; margin-bottom:22px; max-width:420px; }
  .rig-label h1{font-size:19px; font-weight:800; letter-spacing:-.01em;}

  .phone{
    /* 390px screen + 14px bezel each side = 418px frame, so the app renders at
       a true iPhone 14/15 width rather than being squeezed by the bezel. */
    width:418px;
    /* Fit the viewport: never taller than the window, never below a usable
       minimum. 140px covers the page padding + title above/below the frame. */
    height:clamp(520px, calc(100dvh - 140px), 844px);
    background:#000; border-radius:52px; padding:14px;
    box-shadow:var(--shadow-2), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative;
  }
  .phone-screen{
    width:100%; height:100%; background:var(--bg); border-radius:38px; overflow:hidden;
    position:relative; display:flex; flex-direction:column;
  }
  .notch{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:26px; background:#000; border-radius:0 0 16px 16px; z-index:50; }
  .status-bar{
    height:46px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-size:14px; font-weight:600; color:var(--text); background:var(--bg); font-family:'Inter',sans-serif;
  }
  .status-icons{display:flex; align-items:center; gap:5px;}

  .app-header{
    flex:0 0 auto; background:var(--card); border-bottom:1px solid var(--border);
    padding:12px 16px 14px; display:flex; align-items:center; gap:10px;
  }
  .app-header .hbtn{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:transparent; border:none; cursor:pointer; color:var(--text); flex:0 0 auto; }
  .app-header .hbtn:active{background:var(--bg);}
  .slb-mark{flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,20,220,.22);}
  .slb-mark img{width:100%; height:100%; display:block; object-fit:cover;}

  /* ---- Login / SSO screen ---- */
  .login{
    flex:1; display:flex; flex-direction:column; padding:0 26px 30px;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(0,20,220,.10) 0%, rgba(0,20,220,0) 60%),
      var(--card);
    font-family:'Inter',sans-serif;
  }
  .login-top{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .login-logo{width:76px; height:76px; border-radius:20px; overflow:hidden; box-shadow:0 10px 26px rgba(0,20,220,.28); margin-bottom:22px;}
  .login-logo img{width:100%; height:100%; display:block; object-fit:cover;}
  .login h1{font-family:'Poppins',sans-serif; font-size:23px; font-weight:800; letter-spacing:-.02em;}
  .login .login-sub{font-size:13.5px; color:var(--text-2); margin-top:8px; line-height:1.55; max-width:250px;}
  .login-bottom{flex:0 0 auto;}
  .sso-btn{
    width:100%; padding:15px; border-radius:12px; border:none; background:var(--brand); color:#fff;
    font-weight:700; font-size:15px; cursor:pointer; box-shadow:0 8px 18px rgba(0,20,220,.3);
    display:flex; align-items:center; justify-content:center; gap:9px; font-family:'Poppins',sans-serif;
  }
  .sso-btn:disabled{opacity:.75; cursor:default;}
  .sso-note{display:flex; align-items:center; justify-content:center; gap:6px; font-size:11.5px; color:var(--text-3); font-weight:600; margin-top:14px;}
  .login-foot{text-align:center; font-size:10.5px; color:var(--text-3); margin-top:22px; line-height:1.6;}
  .spinner{
    width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff; animation:spin .7s linear infinite; flex:0 0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .app-header .htitle{flex:1; min-width:0;}
  .app-header .htitle .h-eyebrow{font-size:11px; color:var(--brand); font-weight:700; text-transform:uppercase; letter-spacing:.03em; font-family:'Inter',sans-serif;}
  .app-header .htitle h2{font-size:18px; font-weight:700; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .avatar{
    width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#0014DC,#3D5CFF);
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:0 0 auto;
  }

  .screen-content{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:24px; font-family:'Inter',sans-serif;}
  .screen-content::-webkit-scrollbar{width:0;}

  .bottom-nav{ flex:0 0 auto; display:flex; background:var(--card); border-top:1px solid var(--border); padding:8px 4px 16px; position:relative; z-index:30; }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; background:none; border:none; color:var(--text-3); cursor:pointer; }
  .nav-item svg{width:22px; height:22px;}
  .nav-item span{font-size:10px; font-weight:600; font-family:'Inter',sans-serif;}
  .nav-item{padding-left:0; padding-right:0;}
  .nav-item.active{color:var(--brand);}
  .home-indicator{ position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:120px; height:4px; background:#1D2D3E; border-radius:3px; opacity:.25; }

  .section{padding:16px;}
  .section-title{font-size:12.5px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px; font-family:'Poppins',sans-serif;}
  .card{ background:var(--card); border-radius:var(--radius-md); box-shadow:var(--shadow-1); border:1px solid var(--border); padding:16px; }
  .card + .card{margin-top:12px;}

  /* --- Zoho-style attendance / punch card --- */
  .attend-card{
    margin:14px 16px 0; border-radius:var(--radius-lg); padding:20px 18px 22px;
    background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow-1);
  }
  .attend-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .attend-head .a-label{font-size:11.5px; color:var(--text-3); font-weight:700; text-transform:uppercase; letter-spacing:.03em;}
  .attend-head .a-date{font-size:14px; font-weight:700; margin-top:1px;}
  .status-chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px; font-size:11px; font-weight:700; background:var(--positive-bg); color:var(--positive); }
  .status-chip.off{background:var(--critical-bg); color:var(--critical);}
  .status-chip.done{background:var(--brand-tint); color:var(--brand);}
  .status-chip .dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .punch-wrap{display:flex; flex-direction:column; align-items:center; padding:6px 0 4px;}
  .punch-circle{
    width:148px; height:148px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:conic-gradient(from 180deg, var(--brand), #3D5CFF, var(--brand)); color:#fff; cursor:pointer;
    box-shadow:0 12px 26px rgba(0,20,220,.32); position:relative; border:5px solid #fff; outline:2px solid var(--brand-tint);
  }
  .punch-circle.checked{ background:#fff; color:var(--text); outline:2px solid var(--positive); border:5px solid var(--positive-bg); box-shadow:0 8px 20px rgba(30,138,76,.18); cursor:default; }
  .punch-time{font-size:26px; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .punch-time.ticking{font-size:23px; letter-spacing:-.04em;}
  .punch-live{
    display:inline-flex; align-items:center; gap:5px; font-size:9.5px; font-weight:800;
    text-transform:uppercase; letter-spacing:.05em; color:var(--positive); margin-top:3px;
  }
  .punch-live .blip{width:6px; height:6px; border-radius:50%; background:var(--positive); animation:blip 1s ease-in-out infinite;}
  @keyframes blip{0%,100%{opacity:1;} 50%{opacity:.25;}}
  .punch-cta{font-size:12.5px; font-weight:700; margin-top:4px; text-transform:uppercase; letter-spacing:.03em; opacity:.92;}
  .punch-sub{font-size:12px; color:var(--text-3); font-weight:600; margin-top:12px; text-align:center;}

  .punch-actions{display:flex; gap:10px; margin-top:14px; width:100%;}
  .punch-actions button{ flex:1; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .punch-actions button.primary{background:var(--brand); color:#fff; border-color:var(--brand);}

  .meta-row{display:flex; gap:16px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);}
  .meta-row div{flex:1;}
  .meta-row .ml{font-size:11px; color:var(--text-3); font-weight:600; margin-bottom:2px;}
  .meta-row .mv{font-weight:700; font-size:13px;}

  .tile-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:18px 16px 6px;}
  .tile{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 6px 12px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; box-shadow:var(--shadow-1); }
  .tile:active{background:var(--brand-tint);}
  .tile .ticon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .tile span{font-size:10.5px; font-weight:700; text-align:center; color:var(--text-2); line-height:1.25;}

  .list-row{display:flex; align-items:center; gap:12px; padding:12px 0;}
  .list-row + .list-row{border-top:1px solid var(--border);}
  .list-row .lr-icon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .list-row .lr-body{flex:1; min-width:0;}
  .list-row .lr-title{font-size:13.5px; font-weight:700;}
  .list-row .lr-sub{font-size:12px; color:var(--text-3); margin-top:1px;}
  .badge{font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:20px; white-space:nowrap; font-family:'Inter',sans-serif;}
  .badge.approved{color:var(--positive); background:var(--positive-bg);}
  .badge.sentback{color:var(--critical); background:var(--critical-bg);}
  .badge.awaiting{color:var(--neutral); background:#EEF1F0;}
  .badge.denied{color:var(--negative); background:var(--negative-bg);}
  .badge.closed{color:var(--text-3); background:#E9EDEB;}
  .badge.pending{color:var(--brand); background:var(--brand-tint);}
  .badge.manual{color:var(--manual); background:var(--manual-bg);}

  .week-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px;}
  .week-nav button{background:var(--card); border:1px solid var(--border); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .week-nav .wn-label{font-size:15px; font-weight:700; font-family:'Poppins',sans-serif;}
  .week-strip{display:flex; gap:6px; padding:8px 16px 4px;}
  .day-cell{ flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:8px 2px 9px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
  .day-cell .dow{font-size:10px; font-weight:700; color:var(--text-3);}
  .day-cell .dnum{font-size:14px; font-weight:800;}
  .day-cell .dhrs{font-size:9.5px; font-weight:700; color:var(--brand); background:var(--brand-tint); border-radius:6px; padding:1px 5px; min-width:26px; text-align:center;}
  .day-cell .dtypes{display:flex; gap:2px; min-height:5px; margin-top:1px; flex-wrap:wrap; justify-content:center;}
  .dtypes .tdot{width:5px; height:5px; border-radius:50%; flex:0 0 auto;}
  .dtypes .tdot.punch{background:var(--brand);}
  .dtypes .tdot.manual{background:var(--manual);}
  .dtypes .tdot.mgr{background:var(--mgr);}
  .dtypes .tdot.missed{background:var(--negative);}
  .day-cell .dhrs.zero{color:var(--text-3); background:transparent;}
  .day-cell.selected{border-color:var(--brand); background:var(--brand-tint);}
  .day-cell.today .dnum{color:var(--brand);}
  .day-cell.flagged{border-color:var(--negative); background:var(--negative-bg); position:relative;}
  .day-cell.flagged::after{
    content:"!"; position:absolute; top:-5px; right:-4px; width:15px; height:15px; border-radius:50%;
    background:var(--negative); color:#fff; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center; border:1.5px solid #fff;
  }

  .week-total-bar{ margin:10px 16px 0; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:14px; display:flex; justify-content:space-between; align-items:center; }
  .week-total-bar .wt-label{font-size:12px; color:var(--text-3); font-weight:600;}
  .week-total-bar .wt-val{font-size:18px; font-weight:800; margin-top:1px; font-family:'Poppins',sans-serif;}
  .mgr-comment-bar{
    margin:8px 16px 0; padding:11px 13px; border-radius:12px; background:var(--critical-bg);
    border:1px solid var(--critical); color:var(--critical); font-size:12px; font-weight:600;
    display:flex; align-items:flex-start; gap:8px; line-height:1.45;
  }
  .mgr-comment-bar b{font-weight:800;}
  .future-note{
    margin-top:6px; padding:11px 13px; border-radius:12px; background:var(--bg);
    border:1px dashed var(--border); color:var(--text-3); font-size:12px; font-weight:600;
    display:flex; align-items:center; gap:8px;
  }

  .entry-row{ display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-left:4px solid var(--brand); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .entry-row.manual{border-left-color:var(--manual); background:linear-gradient(0deg,var(--manual-bg),var(--manual-bg)),var(--card);}
  .entry-row.inprogress{border-left-color:var(--positive); background:var(--positive-bg); cursor:default;}
  .entry-row.flagged{border-left-color:var(--negative); background:var(--negative-bg);}
  .entry-row.flagged .er-hrs svg{animation:flagPulse 1.6s ease-in-out infinite;}
  @keyframes flagPulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .entry-row.locked{background:var(--bg); cursor:default; border-left-color:var(--text-3);}
  .entry-row.locked .er-time{color:var(--text-2);}
  .badge.locked-badge{color:var(--text-3); background:#E9EDEB; display:inline-flex; align-items:center; gap:3px;}
  .badge.punch-badge{color:var(--brand); background:var(--brand-tint); display:inline-flex; align-items:center; gap:3px;}
  .badge.mgr-badge{color:var(--mgr); background:var(--mgr-bg); display:inline-flex; align-items:center; gap:3px;}
  .entry-row.mgr-edited{border-left-color:var(--mgr); background:linear-gradient(0deg,var(--mgr-bg),var(--mgr-bg)),var(--card);}
  .mgr-line{font-size:10.5px; color:var(--mgr); font-weight:700; margin-top:3px; display:flex; align-items:center; gap:4px;}
  .day-cell.mgr-day{border-color:var(--mgr); position:relative;}
  .day-cell.mgr-day::after{
    content:""; position:absolute; top:-4px; right:-3px; width:9px; height:9px; border-radius:50%;
    background:var(--mgr); border:1.5px solid #fff;
  }
  .entry-legend{display:flex; flex-wrap:wrap; gap:8px 14px; padding:2px 2px 12px;}
  .entry-legend span{display:flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600; color:var(--text-3);}
  .entry-legend i{width:9px; height:9px; border-radius:3px; flex:0 0 auto;}
  .entry-legend i.punch{background:var(--brand);}
  .entry-legend i.manual{background:var(--manual);}
  .entry-legend i.mgr{background:var(--mgr);}
  .entry-legend i.missed{background:var(--negative);}
  .week-legend{padding:10px 16px 2px; gap:6px 12px;}
  .week-legend span{font-size:9.5px;}
  .week-legend i{width:8px; height:8px; border-radius:50%;}
  .entry-row .er-time{font-size:13.5px; font-weight:700;}
  .entry-row .er-type{font-size:11.5px; color:var(--text-3); margin-top:1px; display:flex; align-items:center; gap:6px;}
  .entry-row .er-hrs{margin-left:auto; font-weight:800; font-size:13.5px; color:var(--brand); text-align:right;}

  .empty-state{text-align:center; padding:26px 20px; color:var(--text-3);}
  .empty-state svg{width:40px; height:40px; margin-bottom:8px; opacity:.5;}
  .empty-state p{font-size:13px; font-weight:600;}

  .btn-primary{ width:100%; padding:14px; border-radius:12px; border:none; background:var(--brand); color:#fff; font-weight:700; font-size:14.5px; cursor:pointer; box-shadow:0 6px 14px rgba(0,20,220,.28); font-family:'Poppins',sans-serif; }
  .btn-primary:disabled{background:#C3CBC7; box-shadow:none; cursor:default;}
  .btn-secondary{ width:100%; padding:13px; border-radius:12px; border:1.5px solid var(--border); background:#fff; color:var(--text); font-weight:700; font-size:14px; cursor:pointer; font-family:'Poppins',sans-serif; }
  .btn-danger-outline{ width:100%; padding:13px; border-radius:12px; border:1.5px solid var(--negative); background:#fff; color:var(--negative); font-weight:700; font-size:14px; cursor:pointer; font-family:'Poppins',sans-serif; }
  .btn-row{display:flex; gap:10px; padding:14px 16px 4px;}
  .btn-row > *{flex:1;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:6px;}
  .field label .req{color:var(--negative);}
  .field select, .field input[type=text], .field input[type=number], .field input[type=date], .field textarea{
    width:100%; padding:12px 12px; border-radius:10px; border:1.5px solid var(--border); font-size:14px;
    font-family:'Inter',sans-serif; background:#fff; color:var(--text); appearance:none;
  }
  .field select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C6B65' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; background-size:15px; padding-right:36px; cursor:pointer;
  }
  .field select:focus, .field input:focus, .field textarea:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand);}
  .field textarea{resize:none; min-height:64px;}
  .field-row{display:flex; gap:10px;}
  .field-row > .field{flex:1;}
  .field-static{ background:var(--bg); border-radius:10px; padding:12px; font-weight:700; font-size:15px; color:var(--brand); }
  .helper{font-size:11.5px; color:var(--text-3); margin-top:5px;}

  .time-picker-btn{
    width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 14px;
    border-radius:10px; border:1.5px solid var(--border); background:#fff; font-size:14px; font-weight:700;
    color:var(--text); cursor:pointer; font-family:'Inter',sans-serif;
  }
  .time-picker-btn svg{color:var(--text-3);}
  .time-picker-btn:active{background:var(--brand-tint); border-color:var(--brand);}
  .time-picker-btn.locked-field{
    background:var(--bg); color:var(--text-2); cursor:default; border-style:dashed;
  }
  .time-picker-btn.locked-field:active{background:var(--bg); border-color:var(--border);}
  .time-picker-btn.locked-field svg{color:var(--text-3);}

  .segmented{display:flex; background:var(--bg); border-radius:10px; padding:3px; margin:0 16px 14px;}
  .segmented button{ flex:1; padding:9px; border:none; background:transparent; border-radius:8px; font-weight:700; font-size:13px; color:var(--text-2); cursor:pointer; font-family:'Inter',sans-serif; }
  .segmented button.active{background:#fff; color:var(--text); box-shadow:var(--shadow-1);}

  .subtabs{display:flex; gap:6px; padding:12px 16px 0;}
  .subtab{ flex:1; text-align:center; padding:10px 6px; border-radius:10px; font-weight:700; font-size:12.5px; cursor:pointer; color:var(--text-2); background:var(--card); border:1px solid var(--border); }
  .subtab.active{background:var(--brand); color:#fff; border-color:var(--brand);}

  .month-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px;}
  .month-nav .mn-label{font-size:16px; font-weight:800; font-family:'Poppins',sans-serif;}
  .actions-pill{
    display:inline-flex; align-items:center; gap:6px; flex:0 0 auto;
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:7px 13px; font-size:12.5px; font-weight:700; color:var(--brand);
    cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap;
  }
  .actions-pill:active{background:var(--brand-tint); border-color:var(--brand);}

  /* ---- Monthly timesheet ---- */
  .ts-controls{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .ts-controls select{
    flex:1; padding:9px 10px; border-radius:9px; border:1.5px solid var(--border);
    font-family:'Inter',sans-serif; font-size:13px; font-weight:700; background:#fff; color:var(--text);
    appearance:none; cursor:pointer; padding-right:28px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C6B65' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 9px center; background-size:14px;
  }
  .ts-controls button{
    background:var(--card); border:1px solid var(--border); width:32px; height:32px; border-radius:50%;
    cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--text);
  }
  .ts-dow{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:5px;}
  .ts-dow div{font-size:10px; font-weight:700; color:var(--text-3);}
  .ts-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .ts-day{
    aspect-ratio:1; border:1.5px solid var(--border); border-radius:9px; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    cursor:pointer; padding:2px; min-height:40px;
  }
  .ts-day.blank{border:none; background:transparent; cursor:default;}
  .ts-day .tsd-num{font-size:11.5px; font-weight:700; color:var(--text-2);}
  .ts-day .tsd-hrs{font-size:9px; font-weight:800; color:var(--brand); line-height:1;}
  .ts-day.has{background:var(--brand-tint); border-color:var(--brand);}
  .ts-day.has .tsd-num{color:var(--text);}
  .ts-day.today{box-shadow:0 0 0 2px var(--brand) inset;}
  .ts-day.weekend:not(.has){background:var(--bg);}
  .ts-legend{display:flex; gap:14px; justify-content:center; margin-top:12px; flex-wrap:wrap;}
  .ts-legend span{font-size:10.5px; color:var(--text-3); font-weight:600; display:flex; align-items:center; gap:5px;}
  .ts-sw{width:11px; height:11px; border-radius:3px; border:1.5px solid var(--brand); background:var(--brand-tint);}
  .ts-sw.none{border-color:var(--border); background:#fff;}
  .month-nav-btns{display:flex; gap:6px;}
  /* Circular styling belongs to the prev/next arrows only. Scoping this to
     `.month-nav button` also caught the Actions pill and squashed it to 30x30. */
  .month-nav-btns button{background:var(--card); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--text);}
  .month-nav .mn-label{font-size:16px; font-weight:800; font-family:'Poppins',sans-serif;}
  .cal-grid{padding:0 12px;}
  .cal-dow-row{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:6px;}
  .cal-dow-row div{font-size:10.5px; font-weight:700; color:var(--text-3);}
  .cal-week{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px;}
  .cal-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
  .cal-day .num-wrap{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; position:relative; }
  .cal-day.blank{cursor:default;}
  .cal-day.approved .num-wrap{background:var(--positive-bg); color:var(--positive); border:1.5px solid var(--positive);}
  .cal-day.sentback .num-wrap{background:var(--critical-bg); color:var(--critical); border:1.5px solid var(--critical);}
  .cal-day.awaiting .num-wrap{border:1.5px dashed var(--neutral); color:var(--text-2);}
  .cal-day.picked .num-wrap{background:var(--brand); color:#fff;}
  .cal-day .infodot{position:absolute; bottom:1px; width:5px; height:5px; border-radius:50%; background:var(--info-dot);}
  .cal-day.today .num-wrap{box-shadow:0 0 0 1.5px var(--brand) inset;}

  .legend{display:flex; flex-wrap:wrap; gap:10px 14px; padding:10px 16px 4px;}
  .legend-item{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--text-2);}
  .legend-swatch{width:12px; height:12px; border-radius:50%; flex:0 0 auto;}
  .legend-swatch.approved{background:var(--positive-bg); border:1.5px solid var(--positive);}
  .legend-swatch.sentback{background:var(--critical-bg); border:1.5px solid var(--critical);}
  .legend-swatch.awaiting{border:1.5px dashed var(--neutral);}
  .legend-swatch.info{background:var(--info-dot); border:none; width:6px; height:6px;}

  .link-row{display:flex; justify-content:space-between; padding:10px 16px 14px;}
  .link-btn{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--brand); background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif;}

  .sheet-overlay{ position:absolute; inset:0; background:rgba(20,28,24,.45); z-index:60; opacity:0; pointer-events:none; transition:opacity .22s ease; display:flex; align-items:flex-end; }
  .sheet-overlay.open{opacity:1; pointer-events:auto;}
  .sheet{ width:100%; max-height:88%; background:var(--bg); border-radius:24px 24px 0 0; overflow:hidden; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1); box-shadow:0 -10px 30px rgba(0,0,0,.2); }
  .sheet-overlay.open .sheet{transform:translateY(0%);}
  .sheet-handle{width:36px; height:4px; background:#D5DBD8; border-radius:3px; margin:10px auto 2px;}
  .sheet-header{ display:flex; align-items:center; justify-content:space-between; padding:10px 16px 12px; background:var(--bg); border-bottom:1px solid var(--border); }
  .sheet-header h3{font-size:16px; font-weight:700; font-family:'Poppins',sans-serif;}
  .sheet-header button{background:var(--card); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-2);}
  .sheet-body{padding:16px; overflow-y:auto; font-family:'Inter',sans-serif;}
  .sheet-footer{padding:12px 16px 18px; background:var(--card); border-top:1px solid var(--border);}

  .balance-pill-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0;}
  .balance-pill-row + .balance-pill-row{border-top:1px solid var(--border);}
  .balance-pill-row .bp-name{font-size:13px; font-weight:700;}
  .balance-pill-row .bp-val{font-size:14px; font-weight:800; color:var(--brand);}

  .accordion-toggle{display:flex; align-items:center; justify-content:space-between; padding:12px 0; cursor:pointer; font-size:13px; font-weight:700; color:var(--text);}
  .accordion-body{padding-bottom:10px;}
  .accordion-body.hidden{display:none;}
  .mini-stat-row{display:flex; justify-content:space-between; padding:6px 0; font-size:12.5px;}
  .mini-stat-row .msl{color:var(--text-3); font-weight:600;}
  .mini-stat-row .msv{font-weight:800;}

  .day-chip-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .day-chip{ display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--border); border-radius:10px; padding:11px 13px; cursor:pointer; }
  .day-chip .dc-left .dc-date{font-size:13px; font-weight:700;}
  .day-chip .dc-left .dc-meta{font-size:11.5px; color:var(--text-3); margin-top:1px;}
  .day-chip .dc-chevron{color:var(--text-3);}

  .toast{ position:absolute; left:16px; right:16px; bottom:96px; background:#1E2A26; color:#fff; padding:13px 16px; border-radius:12px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px; box-shadow:0 8px 20px rgba(0,0,0,.25); z-index:90; transform:translateY(20px); opacity:0; pointer-events:none; transition:all .25s ease; font-family:'Inter',sans-serif; }
  .toast.show{transform:translateY(0); opacity:1;}
  .toast svg{flex:0 0 auto; color:#7CFFA0;}

  .team-row{display:flex; align-items:center; gap:12px; padding:11px 0;}
  .team-row + .team-row{border-top:1px solid var(--border);}
  .team-row .t-avatar{width:36px; height:36px; border-radius:50%; background:var(--brand-tint); color:var(--brand); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12.5px;}
  .team-row .t-name{font-size:13px; font-weight:700;}
  .team-row .t-dates{font-size:11.5px; color:var(--text-3); margin-top:1px;}

  .kv-card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px;}
  .kv-row{display:flex; justify-content:space-between; padding:6px 0; font-size:13px;}
  .kv-row .kl{color:var(--text-3); font-weight:600;}
  .kv-row .kv{font-weight:700;}

  .nav-dot{
    position:absolute; top:-5px; right:-9px; min-width:15px; height:15px; padding:0 4px;
    background:var(--negative); color:#fff; border-radius:8px; font-size:9.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; font-family:'Inter',sans-serif;
  }
  .req-actions{display:flex; gap:8px; margin-top:12px;}
  /* Request cards run a touch smaller than default list rows */
  .req-card .lr-title{font-size:12.5px;}
  .req-card .lr-sub{font-size:11px; line-height:1.4;}
  .req-card .lr-icon{width:32px; height:32px;}
  .req-card .badge{font-size:9.5px; padding:2px 7px;}
  .req-card .req-act{padding:8px; font-size:11.5px;}
  .req-card .sentback-note{font-size:10.5px; padding:7px 9px;}
  .req-act{
    flex:1; padding:9px; border-radius:9px; border:1.5px solid var(--border); background:#fff;
    color:var(--text); font-weight:700; font-size:12.5px; cursor:pointer; font-family:'Inter',sans-serif;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .req-act.primary{background:var(--brand); color:#fff; border-color:var(--brand);}
  .req-act.danger{color:var(--negative); border-color:var(--negative);}
  .sentback-note{
    margin-top:8px; padding:8px 10px; border-radius:8px; background:var(--critical-bg);
    color:var(--critical); font-size:11.5px; font-weight:600; display:flex; align-items:flex-start; gap:6px; line-height:1.4;
  }
  .req-tab-row{display:flex; gap:6px; padding:2px 16px 12px;}
  .req-tab{flex:1; text-align:center; padding:8px; border-radius:9px; font-size:12px; font-weight:700; background:var(--card); border:1px solid var(--border); color:var(--text-2); cursor:pointer;}
  .req-tab.active{background:var(--text); color:#fff; border-color:var(--text);}

  /* Android-style spinner time picker */
  .spinner-wrap{padding:10px 0 4px;}
  .spinner-title{font-size:13.5px; font-weight:700; text-align:center; margin-bottom:16px; font-family:'Poppins',sans-serif;}
  .spinner-cols{display:flex; justify-content:center; align-items:center; gap:8px; position:relative; height:160px;}
  .spinner-highlight{position:absolute; left:6px; right:6px; top:60px; height:40px; background:var(--brand-tint); border-radius:10px; pointer-events:none; z-index:0; border-top:1.5px solid var(--brand); border-bottom:1.5px solid var(--brand);}
  .spinner-col{width:62px; height:160px; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; position:relative; z-index:1;}
  .spinner-col::-webkit-scrollbar{display:none;}
  .spinner-col-pad{height:60px;}
  .spinner-item{height:40px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; color:var(--text-3); scroll-snap-align:center; font-variant-numeric:tabular-nums;}
  .spinner-colon{font-size:20px; font-weight:800; color:var(--text); z-index:1;}
  .spinner-ampm{width:54px;}

  /* ============================================================
     On a real phone, drop the mock device chrome and fill the
     screen. The bezel/notch/status bar are presentation-only —
     the actual device already provides them.
     ============================================================ */
  @media (max-width: 500px){
    body{
      padding:0; margin:0; display:block; background:var(--bg);
      min-height:100vh; min-height:100dvh;
      overscroll-behavior:none;
    }
    .rig-label{display:none;}
    .phone{
      width:100%; max-width:100%;
      height:100vh; height:100dvh;
      padding:0; border-radius:0; background:var(--bg); box-shadow:none;
    }
    .phone-screen{border-radius:0;}
    .notch{display:none;}
    .status-bar{display:none;}          /* the device shows its own */
    .home-indicator{display:none;}
    /* respect the notch / home bar */
    .app-header{padding-top:calc(12px + env(safe-area-inset-top, 0px));}
    .login{padding-top:calc(16px + env(safe-area-inset-top, 0px));}
    .bottom-nav{padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px));}
    .sheet{max-height:92%; border-radius:20px 20px 0 0;}
    .sheet-footer{padding-bottom:calc(14px + env(safe-area-inset-bottom, 0px));}
    .toast{bottom:calc(86px + env(safe-area-inset-bottom, 0px));}
    /* iOS zooms the page when focusing an input under 16px */
    .field select, .field input[type=text], .field input[type=number],
    .field input[type=date], .field textarea{font-size:16px;}
  }
</style>

/* ---------------- Date helpers ---------------- */
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
// Build the key from LOCAL date parts. Using toISOString() here would convert to
// UTC and shift the date by a day in timezones east/west of GMT (e.g. IST +5:30).
function fmtISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function startOfWeek(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r; }
function sameDate(a,b){ return fmtISO(a)===fmtISO(b); }
function fmtHuman(d){ return `${DOW[d.getDay()]}, ${MON[d.getMonth()].slice(0,3)} ${d.getDate()}`; }
function fmtRange(a,b){ if(sameDate(a,b)) return fmtHuman(a); return `${fmtHuman(a)} – ${fmtHuman(b)}`; }
function daysLabel(hours){ const d = Math.round((hours/8)*10)/10; return `${d.toFixed(1)} ${d===1?'Day':'Days'}`; }

const TODAY = new Date();
/* status-bar clock: 12-hour like a phone lock screen, e.g. 6:33 */
function nowClock(){
  const d = new Date();
  let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
  h = h % 12; if(h===0) h = 12;
  return `${h}:${m}`;
}
/* keep the status-bar clock current every 15s */
setInterval(()=>{ const el = document.getElementById('clockTime'); if(el) el.textContent = nowClock(); }, 15000);

/* Submitted weeks. Key = ISO date of that week's Sunday.
   snapshot = deep copy of the entries exactly as they were submitted, so a later

let weekSubs = {};

let entries = {}; // dateISO -> [{id,type,in,out,outReason,hours,costCenter,jobDiff,source}]
(function seedEntries(){
  // CURRENT week (Not yet submitted). Placed within this week (Sun..yesterday),
  // leaving TODAY with no entry so the Home check-in countdown runs cleanly.
  // No missed checkout here — that's demonstrated on an earlier week.
  const wkStart = startOfWeek(TODAY);
  const todayIdx = TODAY.getDay(); // 0=Sun .. 6=Sat
  const dayISO = i => fmtISO(addDays(wkStart, i));
  const put = (i, entry) => { entries[dayISO(i)] = [entry]; };

  const queue = [
    // completed punch
    {id:cuid(),type:'Regular Hours Worked',in:'08:00',out:'16:30',outReason:'Out',hours:8,costCenter:COST_CENTERS[0],jobDiff:'None',source:'checkin',fromPunch:true},
    // a manual entry
    {id:cuid(),type:'Regular Hours Worked',in:'08:00',out:'16:30',outReason:'Out',hours:8,costCenter:COST_CENTERS[0],jobDiff:'None',source:'manual',fromPunch:false},
  ];
  // Fill starting YESTERDAY, backwards, so today stays empty for the countdown.
  let i = todayIdx - 1;
  for(const entry of queue){ if(i < 0) break; put(i, entry); i--; }
})();

/* Example submitted weekly timesheets showing each manager response. Keyed by
   the week's Sunday. snapshot omitted for seeds (only used for edit-diffing). */
(function seedTimesheets(){
  const thisWk = startOfWeek(TODAY);
  const wk = n => fmtISO(addDays(thisWk, n*7));

  // Fill a past week (Mon–Fri) with completed check in/out entries. Options:
  //  manualDow  – make this weekday a MANUAL entry
  //  missedDows – array of weekdays that are MISSED checkouts (no out time)
  //  mgrDow     – make this weekday a MANAGER-EDITED entry
  function fillWeek(offset, opts={}){
    const {manualDow, missedDows=[], mgrDow} = opts;
    const start = addDays(thisWk, offset*7);
    for(let dow=1; dow<=5; dow++){ // Mon..Fri
      const d = fmtISO(addDays(start, dow));
      if(entries[d] && entries[d].length) continue; // don't stack onto demo data
      if(missedDows.includes(dow)){
        entries[d] = [{id:cuid(), type:'Regular Hours Worked', in:'08:00', out:null,
          outReason:'Out', hours:0, costCenter:COST_CENTERS[0], jobDiff:'None', source:'checkin', fromPunch:true}];
      } else if(dow===mgrDow){
        entries[d] = [{id:cuid(), type:'Overtime', in:'08:00', out:'18:00',
          outReason:'Out', hours:10, costCenter:COST_CENTERS[0], jobDiff:'None', source:'manual', fromPunch:false,
          mgrEdit:{by:'Daniel Okafor', when:'before submitting', note:'Approved 2h overtime for the shift extension.', from:{type:'Regular Hours Worked', in:'08:00', out:'16:30', hours:8}}}];
      } else {
        const isManual = dow===manualDow;
        entries[d] = [{id:cuid(), type:'Regular Hours Worked', in:'08:00', out:'16:30',
          outReason:'Out', hours:8, costCenter:COST_CENTERS[0], jobDiff:'None',
          source: isManual ? 'manual' : 'checkin', fromPunch: !isManual}];
      }
    }
  }
  // Weeks -1..-4, contiguous, immediately before the current week.
  //  -1 (Jul 12-18): approved, with a MANAGER-EDITED day (Wed)
  //  -2: sent back
  //  -3: denied
  //  -4 (Jun 21-27): two MISSED checkouts (Tue & Thu)

/* snapshot of a given past week, used as the submitted baseline */
function snapshotWeekAt(offset){
  const start = addDays(startOfWeek(TODAY), offset*7);

}

}

/* fields that matter when deciding "has this changed since submission" */
function entryFingerprint(e){
  return {id:e.id, type:e.type, in:e.in, out:e.out, hours:e.hours,
          outReason:e.outReason, costCenter:e.costCenter, jobDiff:e.jobDiff};
}
function snapshotWeek(){
  const snap = {};
  for(const d of weekDates()){
    const iso = fmtISO(d);
    snap[iso] = (entries[iso]||[]).map(e=>({...e}));
  }
  return snap;
}
function weekChangedSince(snap){
  if(!snap) return false;
  for(const d of weekDates()){
    const iso = fmtISO(d);
    const cur = (entries[iso]||[]).map(entryFingerprint);
    const old = (snap[iso]||[]).map(entryFingerprint);
    if(JSON.stringify(cur) !== JSON.stringify(old)) return true;
  }
  return false;
}
function weekStatus(){
  // An unresolved missed checkout can't sit in an approved week — it must be
  // fixed first, so surface it as Sent back regardless of any stored status.
  if(weekMissedOutDay()) return {key:'sentback', label:'Sent back · missing check out', cls:'sentback'};
  const sub = weekSubs[currentWeekKey()];
  if(!sub) return {key:'none', label:'Not yet submitted', cls:'pending'};
  if(weekChangedSince(sub.snapshot)) return {key:'edited', label:'Edited · resubmit', cls:'sentback'};
  if(sub.status==='approved') return {key:'approved', label:'Approved', cls:'approved'};
  if(sub.status==='denied')   return {key:'denied',   label:'Denied',   cls:'denied'};
  if(sub.status==='sentback') return {key:'sentback', label:'Sent back', cls:'sentback'};
  return {key:'submitted', label:'Submitted', cls:'pending'};
}

function submittedVersionOf(dISO, entryId){
  const sub = weekSubs[weekKeyFor(dISO)];
  if(!sub || !sub.snapshot || !entryId) return null;
  return (sub.snapshot[dISO]||[]).find(e=>e.id===entryId) || null;
}

function to12(t){ if(!t) return '--'; const [h,m]=t.split(':').map(Number); const ap = h>=12?'PM':'AM'; const hh = ((h+11)%12)+1; return `${hh}:${String(m).padStart(2,'0')} ${ap}`; }

function selectDay(iso){ state.selectedDay=iso; render(); }
function submitWeek(){
  // An open check-in is always for today, so it can only affect the current week.
  if(state.checkedIn && state.weekOffset===0){
    toast("You're still checked in — check out on Home first, then submit",'warn');
    setTab('home');
    return;
  }
  const missedDay = weekMissedOutDay();
  if(missedDay){
    state.selectedDay = fmtISO(missedDay);
    render();
    toast(`Missed check out on ${fmtHuman(missedDay)} · resolve it before submitting`,'warn');
    return;
  }
  if(weekTotal()===0){ toast('Add at least one time entry before submitting','warn'); return; }
  const now = new Date();
  const resubmit = !!weekSubs[currentWeekKey()];
  weekSubs[currentWeekKey()] = {
    status: 'submitted',
    submittedAt: now,
    submittedLabel: `${fmtHuman(now)} at ${now.toTimeString().slice(0,5)}`,
    decidedLabel: '',
    managerComment: '',
    snapshot: snapshotWeek()
  };
  render();
  toast(resubmit ? `Resubmitted to ${MANAGER.name} for approval` : `Submitted to ${MANAGER.name} for approval`,'success');
}

/* ---- Add/Edit Time Entry sheet (with Android-style spinner time picker) ---- */
function calcHours(inT,outT){
  if(!inT||!outT) return 0;
  const [ih,im]=inT.split(':').map(Number), [oh,om]=outT.split(':').map(Number);
  let mins = (oh*60+om)-(ih*60+im);
  if(mins<0) mins+=24*60;
  return mins/60;
}
/* "Jul 12 – 18, 2026" · "Jun 28 – Jul 4, 2026" · "Dec 28, 2025 – Jan 3, 2026" */
function weekLabel(wd){
  const a = wd[0], b = wd[6];
  const aM = MON[a.getMonth()].slice(0,3), bM = MON[b.getMonth()].slice(0,3);
  const aY = a.getFullYear(), bY = b.getFullYear();
  if(aY !== bY)                     return `${aM} ${a.getDate()}, ${aY} – ${bM} ${b.getDate()}, ${bY}`;
  if(a.getMonth() !== b.getMonth()) return `${aM} ${a.getDate()} – ${bM} ${b.getDate()}, ${aY}`;
  return `${aM} ${a.getDate()} – ${b.getDate()}, ${aY}`;
}
/* how many weeks away from the current week a given date sits */
function weekOffsetFor(dISO){
  const target = startOfWeek(new Date(dISO+'T00:00:00'));
  const base = startOfWeek(TODAY);
  return Math.round((target - base) / (7*86400000));
}
function timeToMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
/* An entry as a minute span. Out <= In means it ran past midnight, so extend it. */
function entrySpan(e){
  const [ih,im]=e.in.split(':').map(Number), [oh,om]=e.out.split(':').map(Number);
  let s = ih*60+im, en = oh*60+om;
  if(en <= s) en += 1440;
  return [s,en];
}
function spansOverlap(a,b){ return a[0] < b[1] && b[0] < a[1]; }
function addMins(t, mins){
  const [h,m]=t.split(':').map(Number);
  const total = ((h*60+m+mins) % 1440 + 1440) % 1440;
  return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}
/* Where a new entry should start: right after the latest existing checkout that day. */
function nextStartFor(dISO){
  const list = (entries[dISO]||[]).filter(e=>e.out);
  if(!list.length) return null;
  let out = null, latestEnd = -1;
  for(const e of list){
    const [,en] = entrySpan(e);
    if(en > latestEnd){ latestEnd = en; out = e.out; }
  }
  return out;
}
/* Returns the first existing entry the given span clashes with, or null. */
function findOverlap(dISO, inT, outT, ignoreId){
  const span = entrySpan({in:inT, out:outT});
  for(const e of (entries[dISO]||[])){
    if(e.id === ignoreId) continue;
    if(!e.out) continue; // an unresolved check-in has no span to clash with
    if(spansOverlap(span, entrySpan(e))) return e;
  }
  return null;
}
/* An entry that was checked in but never checked out */
function missedOutEntry(dISO){ return (entries[dISO]||[]).find(e=>!e.out) || null; }
function mgrEditedEntry(dISO){ return (entries[dISO]||[]).find(e=>e.mgrEdit) || null; }
/* One colored dot per entry-type present on a day, matching the legend:
   punch=blue, manual=purple, manager=teal, missed=red. */
function dayTypeKinds(dISO){
  const kinds = new Set();
  for(const e of (entries[dISO]||[])){
    if(!e.out) kinds.add('missed');
    else if(e.mgrEdit) kinds.add('mgr');
    else if(e.source==='checkin') kinds.add('punch');
    else kinds.add('manual');
  }
  // stable, meaningful order
  return ['missed','mgr','punch','manual'].filter(k=>kinds.has(k));
}
function dayTypeDots(dISO){
  return dayTypeKinds(dISO).map(k=>`<i class="tdot ${k}"></i>`).join('');
}
function weekMissedOutDay(){
  for(const d of weekDates()){ if(missedOutEntry(fmtISO(d))) return d; }
  return null;
}
/* One row of the submitted-vs-current comparison. Shows an arrow only when changed. */
function cmpRow(label, oldVal, newVal){
  const changed = String(oldVal) !== String(newVal);
  return `<div class="kv-row">
    <span class="kl">${label}</span>
    <span class="kv">
      <span style="${changed?'text-decoration:line-through; color:var(--text-3); font-weight:600;':''}">${oldVal}</span>
      ${changed ? ` <span style="color:var(--critical);">→</span> <span style="color:var(--critical); font-weight:800;">${newVal}</span>` : ''}
    </span>
  </div>`;
}
function sheetAddEntry(ctx){
  const dISO = ctx.dateISO;
  // Never allow logging time for a future date, whatever path opened this.
  if(new Date(dISO+'T00:00:00') > new Date(fmtISO(TODAY)+'T00:00:00')){
    closeSheet();
    futureDayTap();
    return;
  }
  const existing = ctx.entryId ? (entries[dISO]||[]).find(e=>e.id===ctx.entryId) : null;
  if(!entryDraft || entryDraft.dateISO!==dISO || entryDraft.entryId!==(ctx.entryId||null)){
    if(existing){
      // An unresolved check-in has no Out yet — suggest a standard 8h day
      let outVal = existing.out;
      if(!outVal){
        outVal = addMins(existing.in, 480);
        if(timeToMin(outVal) <= timeToMin(existing.in)) outVal = '23:59';
      }
      entryDraft = {dateISO:dISO, entryId:ctx.entryId, type:existing.type, in:existing.in, out:outVal, outReason:existing.outReason, costCenter:existing.costCenter, jobDiff:existing.jobDiff, source:existing.source, fromPunch:!!existing.fromPunch, resolving:!existing.out};
    } else {
      // Start a new entry after the last checkout of the day so it can't sit on
      // top of time already logged. First entry of the day falls back to 08:00.
      const lastOut = nextStartFor(dISO);
      const startAt = lastOut || '08:00';
      let endAt = lastOut ? addMins(lastOut, 60) : '16:00';
      // Out must stay after In, so don't let the default roll past midnight
      if(timeToMin(endAt) <= timeToMin(startAt)) endAt = '23:59';
      entryDraft = {dateISO:dISO, entryId:null, type:'Regular Hours Worked', in:startAt, out:endAt, outReason:'Out', costCenter:COST_CENTERS[0], jobDiff:'None', source:null, fromPunch:false};
    }
  }
  // Out must come after In on the same day
  const badOrder = timeToMin(entryDraft.out) <= timeToMin(entryDraft.in);
  // The check-in time on a real punch can never be edited — while resolving a
  // missed checkout AND after it's completed.
  const lockIn = !!entryDraft.fromPunch;
  const hrs = badOrder ? 0 : calcHours(entryDraft.in, entryDraft.out);
  // Total for this day excluding the entry being edited, so edits don't count themselves twice
  const otherHours = (entries[dISO]||[]).reduce((s,e)=> e.id===entryDraft.entryId ? s : s+e.hours, 0);
  const dayTotalNew = otherHours + hrs;
  const over = dayTotalNew > MAX_DAY_HOURS + 1e-9;
  const clash = badOrder ? null : findOverlap(dISO, entryDraft.in, entryDraft.out, entryDraft.entryId);
  const prev = submittedVersionOf(dISO, entryDraft.entryId);
  const addedAfterSubmit = !prev && existing && weekIsSubmitted(dISO);
  const blocked = over || !!clash || badOrder;
  // Manager edits never apply to an unmatched/missed check-in — resolving those
  // is the employee's job alone, so suppress any manager banner while resolving.
  const mgr = (existing && existing.mgrEdit && !entryDraft.resolving && existing.out) ? existing.mgrEdit : null;
  document.getElementById('sheetTitle').textContent = entryDraft.resolving ? 'Complete Check Out' : existing ? 'Edit Time Entry' : 'Enter Time';
  document.getElementById('sheetBody').innerHTML = `
    <div style="font-size:12.5px; color:var(--text-3); font-weight:700; margin-bottom:14px;">${fmtHuman(new Date(dISO+'T00:00:00'))}</div>
    ${mgr ? `
      <div class="kv-card" style="background:var(--mgr-bg); border-color:var(--mgr);">
        <div style="font-size:11px; font-weight:800; color:var(--mgr); text-transform:uppercase; letter-spacing:.03em; margin-bottom:8px;">
          ${svg('user',12)} Modified by ${mgr.by} · ${mgr.when}
        </div>
        ${cmpRow('Time Type', mgr.from.type, existing.type)}
        ${cmpRow('Time In',   to12(mgr.from.in),  to12(existing.in))}
        ${cmpRow('Time Out',  to12(mgr.from.out), to12(existing.out))}
        ${cmpRow('Hours',     mgr.from.hours.toFixed(2), existing.hours.toFixed(2))}
        ${mgr.note ? `<div class="helper" style="margin-top:6px; color:var(--text-2);">"${mgr.note}"</div>` : ''}
      </div>` : ''}
    ${entryDraft.resolving ? `
      <div class="kv-card" style="background:var(--negative-bg); border-color:var(--negative);">
        <div style="font-size:11.5px; font-weight:700; color:var(--negative);">
          ${svg('flag',12)} You checked in at ${to12(entryDraft.in)} but never checked out. Set the Out time below to resolve this flag.
        </div>
      </div>` : ''}
    ${prev ? `
      <div class="kv-card" style="background:var(--critical-bg); border-color:var(--critical);">
        <div style="font-size:11px; font-weight:800; color:var(--critical); text-transform:uppercase; letter-spacing:.03em; margin-bottom:8px;">
          ${svg('info',12)} Previously submitted &nbsp;·&nbsp; ${weekSubs[weekKeyFor(dISO)].submittedLabel}
        </div>
        ${cmpRow('Time In',  to12(prev.in),  to12(entryDraft.in))}
        ${cmpRow('Time Out', to12(prev.out), to12(entryDraft.out))}
        ${cmpRow('Hours',    prev.hours.toFixed(2), calcHours(entryDraft.in, entryDraft.out).toFixed(2))}
        ${cmpRow('Time Type', prev.type, entryDraft.type)}
        ${(prev.in===entryDraft.in && prev.out===entryDraft.out && prev.type===entryDraft.type)
          ? `<div class="helper" style="margin-top:6px;">No changes yet — matches what your manager received.</div>`
          : `<div class="helper" style="color:var(--critical); font-weight:700; margin-top:6px;">Changed — the week will need resubmitting.</div>`}
      </div>` : ''}
    ${addedAfterSubmit ? `
      <div class="kv-card" style="background:var(--brand-tint); border-color:var(--brand);">
        <div style="font-size:11.5px; font-weight:700; color:var(--brand);">${svg('info',12)} Added after the week was submitted — not yet sent to your manager.</div>
      </div>` : ''}
    <div class="field">
      <label>Time Type <span class="req">*</span></label>
      <select onchange="entryDraft.type=this.value">${TIME_TYPES.map(t=>`<option ${t===entryDraft.type?'selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="field-row">
      <div class="field">
        <label>In <span class="req">*</span></label>
        ${lockIn
          ? `<div class="time-picker-btn locked-field"><span>${to12(entryDraft.in)}</span>${svg('lock',14)}</div>`
          : `<button type="button" class="time-picker-btn" onclick="openTimeSpinner('in')"><span>${to12(entryDraft.in)}</span>${svg('clock',16)}</button>`}
      </div>
      <div class="field">
        <label>Out <span class="req">*</span></label>
        <button type="button" class="time-picker-btn" onclick="openTimeSpinner('out')"><span>${to12(entryDraft.out)}</span>${svg('clock',16)}</button>
      </div>
    </div>
    ${badOrder
      ? `<div class="helper" style="margin:-8px 0 14px; color:var(--negative); font-weight:700;">${svg('info',12)} Out time must be after In time</div>`
      : lockIn
        ? `<div class="helper" style="margin:-8px 0 14px;">${svg('lock',11)} The recorded check-in time can't be changed${entryDraft.resolving?' — set the Out time only':''}.</div>`
        : `<div class="helper" style="margin:-8px 0 14px;">Tap a time to open the spinner picker</div>`}
    <div class="field">
      <label>Out Reason</label>
      <select onchange="entryDraft.outReason=this.value">${OUT_REASONS.map(r=>`<option ${r===entryDraft.outReason?'selected':''}>${r}</option>`).join('')}</select>
    </div>
    <div class="field">
      <label>Calculated Hours</label>
      <div class="field-static" style="${(over||badOrder)?'color:var(--negative);':''}">${badOrder ? '—' : hrs.toFixed(2)+' hrs'}</div>
      ${badOrder
        ? `<div class="helper" style="color:var(--negative); font-weight:700;">Cannot calculate — the Out time (${to12(entryDraft.out)}) is not after the In time (${to12(entryDraft.in)}).</div>`
        : `<div class="helper" style="${over?'color:var(--negative); font-weight:700;':''}">
             ${otherHours>0 ? `Already logged today: ${otherHours.toFixed(2)} hrs · ` : ''}Day total: ${dayTotalNew.toFixed(2)} / ${MAX_DAY_HOURS} hrs${over?` — exceeds the ${MAX_DAY_HOURS}-hour daily limit` : ''}
           </div>`}
      ${clash ? `<div class="helper" style="color:var(--negative); font-weight:700;">Overlaps an existing entry (${to12(clash.in)} – ${to12(clash.out)}). Start this entry at or after ${to12(clash.out)}.</div>` : ''}
    </div>
    <div class="field">
      <label>Cost Center <span style="font-weight:500;color:var(--text-3);">(optional)</span></label>
      <select onchange="entryDraft.costCenter=this.value">${COST_CENTERS.map(c=>`<option ${c===entryDraft.costCenter?'selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="field">
      <label>Job Differential <span style="font-weight:500;color:var(--text-3);">(optional, region-dependent)</span></label>
      <select onchange="entryDraft.jobDiff=this.value">${JOB_DIFFS.map(j=>`<option ${j===entryDraft.jobDiff?'selected':''}>${j}</option>`).join('')}</select>
    </div>
  `;
  const footer = document.getElementById('sheetFooter');
  footer.style.display='block';
  const canDelete = existing && !entryDraft.fromPunch;
  footer.innerHTML = `
    ${canDelete ? `<div class="btn-row" style="padding:0 0 10px;"><button class="btn-danger-outline" onclick="deleteEntry('${dISO}','${existing.id}')">${svg('trash',14)} Delete Entry</button></div>`:''}
    <button class="btn-primary" ${blocked?'disabled':''} onclick="saveEntryFromDraft()">${badOrder?'Out time must be after In time': over?`Exceeds ${MAX_DAY_HOURS}-hour daily limit`: clash?'Overlaps an existing entry':'Save Entry'}</button>
  `;
}
function saveEntryFromDraft(){
  const dISO = entryDraft.dateISO;
  // Guard: Out must be after In
  if(timeToMin(entryDraft.out) <= timeToMin(entryDraft.in)){
    toast('Out time must be after In time','warn');
    return;
  }
  const hours = calcHours(entryDraft.in, entryDraft.out);
  // Guard: entries for a single day must not total more than MAX_DAY_HOURS.
  // Exclude the entry being edited so an edit doesn't count its own old value.
  const otherHours = (entries[dISO]||[]).reduce((s,e)=> e.id===entryDraft.entryId ? s : s+e.hours, 0);
  if(otherHours + hours > MAX_DAY_HOURS + 1e-9){
    toast(`Day total would be ${(otherHours+hours).toFixed(2)} hrs · max ${MAX_DAY_HOURS} hrs per day`,'warn');
    return;
  }
  // Guard: an entry may not sit on top of time already logged that day
  const clash = findOverlap(dISO, entryDraft.in, entryDraft.out, entryDraft.entryId);
  if(clash){
    toast(`Overlaps ${to12(clash.in)} – ${to12(clash.out)} · start at or after ${to12(clash.out)}`,'warn');
    return;
  }
  if(!entries[dISO]) entries[dISO]=[];
  if(entryDraft.entryId){
    const idx = entries[dISO].findIndex(e=>e.id===entryDraft.entryId);
    // Resolving a missed check out is a manual correction, so record it as such
    const src = entryDraft.resolving ? 'manual' : entries[dISO][idx].source;
    entries[dISO][idx] = {...entries[dISO][idx], type:entryDraft.type, in:entryDraft.in, out:entryDraft.out, outReason:entryDraft.outReason, hours, costCenter:entryDraft.costCenter, jobDiff:entryDraft.jobDiff, source:src};
  } else {
    entries[dISO].push({id:cuid(), type:entryDraft.type, in:entryDraft.in, out:entryDraft.out, outReason:entryDraft.outReason, hours, costCenter:entryDraft.costCenter, jobDiff:entryDraft.jobDiff, source:'manual', fromPunch:false});
  }
  entryDraft = null;
  closeSheet();
  render();
  toast('Entry saved','success');
}
function deleteEntry(dISO, entryId){
  entries[dISO] = (entries[dISO]||[]).filter(e=>e.id!==entryId);
  entryDraft = null;
  closeSheet();
  render();
  toast('Entry deleted','success');
}

/* ---- Android spinner-mode time picker ---- */
function buildSpinnerCol(id, items){
  return `<div class="spinner-col" id="${id}">
    <div class="spinner-col-pad"></div>
    ${items.map(it=>`<div class="spinner-item">${it}</div>`).join('')}
    <div class="spinner-col-pad"></div>
  </div>`;
}
function setSpinnerScroll(id, index){ document.getElementById(id).scrollTop = index*40; }
function readSpinnerIndex(id){ return Math.round(document.getElementById(id).scrollTop/40); }
function openTimeSpinner(which){
  // A recorded check-in cannot be edited — only the missing Out may be set
  if(which === 'in' && entryDraft.fromPunch){
    toast("The recorded check-in time can't be changed",'info');
    return;
  }
  spinnerWhich = which;
  const val = entryDraft[which] || '08:00';
  const [h24,m] = val.split(':').map(Number);
  const ampm = h24>=12 ? 'PM':'AM';
  let h12 = h24%12; if(h12===0) h12=12;
  const minuteRounded = Math.round(m/5)*5 % 60;
  const hourIdx = h12-1;
  const minIdx = minuteRounded/5;
  const ampmIdx = ampm==='AM'?0:1;
  document.getElementById('sheetTitle').textContent = which==='in' ? 'Set Time In' : 'Set Time Out';
  document.getElementById('sheetBody').innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner-title">Scroll to select time</div>
      <div class="spinner-cols">
        <div class="spinner-highlight"></div>
        ${buildSpinnerCol('sp_hour', Array.from({length:12},(_,i)=>i+1))}
        <div class="spinner-colon">:</div>
        ${buildSpinnerCol('sp_min', Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0')))}
        <div class="spinner-col spinner-ampm" id="sp_ampm">
          <div class="spinner-col-pad"></div>
          <div class="spinner-item">AM</div>
          <div class="spinner-item">PM</div>
          <div class="spinner-col-pad"></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `
    <div class="btn-row" style="padding:0;">
      <button class="btn-secondary" onclick="cancelTimeSpinner()">Cancel</button>
      <button class="btn-primary" onclick="confirmTimeSpinner()">Done</button>
    </div>
  `;
  requestAnimationFrame(()=>{
    setSpinnerScroll('sp_hour', hourIdx);
    setSpinnerScroll('sp_min', minIdx);
    setSpinnerScroll('sp_ampm', ampmIdx);
  });
}
function cancelTimeSpinner(){ sheetAddEntry({dateISO:entryDraft.dateISO, entryId:entryDraft.entryId}); }
function confirmTimeSpinner(){
  const hourIdx = Math.min(Math.max(readSpinnerIndex('sp_hour'),0),11);
  const minIdx = Math.min(Math.max(readSpinnerIndex('sp_min'),0),11);
  const ampmIdx = Math.min(Math.max(readSpinnerIndex('sp_ampm'),0),1);
  const hour12 = hourIdx+1;
  const minute = minIdx*5;
  const ampm = ampmIdx>=1 ? 'PM':'AM';
  let hour24 = hour12%12; if(ampm==='PM') hour24+=12;
  entryDraft[spinnerWhich] = `${String(hour24).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  sheetAddEntry({dateISO:entryDraft.dateISO, entryId:entryDraft.entryId});
}

    <div class="field">

  `;

function doCheckOut(){
  const now = new Date();
  const dISO = fmtISO(now);
  const outT = now.toTimeString().slice(0,5);
  if(!entries[dISO]) entries[dISO]=[];
  entries[dISO].push({id:cuid(), type:'Regular Hours Worked', in:state.checkInTime, out:outT, outReason:'Out', hours:calcHours(state.checkInTime,outT), costCenter:COST_CENTERS[0], jobDiff:'None', source:'checkin', fromPunch:true});
  state.checkedIn=false; state.checkedOut=true; state.checkOutTime=outT; state.checkInDate=null;
  closeSheet(); render();
  toast('Checked out · entry added to today','success');
}

/* ================= TIME OFF ================= */
function monthAnchor(){ return new Date(TODAY.getFullYear(), TODAY.getMonth()+state.todMonthOffset, 1); }
function monthMatrix(anchor){
  const year=anchor.getFullYear(), month=anchor.getMonth();
  const firstDow = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(year,month,d));
  while(cells.length%7!==0) cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  return weeks;
}
function statusForDate(iso){ for(const r of toRequests){ if(r.days.some(dd=>dd.date===iso)) return r.status; } return null; }
function requestForDate(iso){ return toRequests.find(r=>r.days.some(dd=>dd.date===iso)); }

function screenTimeOff(){
  return `
    <div class="subtabs">
      <div class="subtab ${state.todSubtab==='request'?'active':''}" onclick="setTodSubtab('request')">Request Time Off</div>
      <div class="subtab ${state.todSubtab==='manage'?'active':''}" onclick="setTodSubtab('manage')">Manage Time Off</div>
    </div>
    ${state.todSubtab==='request' ? screenRequestTimeOff() : screenManageTimeOff()}
  `;
}
function setTodSubtab(t){ state.todSubtab=t; renderHeader(); document.getElementById('screenContent').innerHTML = screenTimeOff(); }

function screenRequestTimeOff(){
  const anchor = monthAnchor();
  const weeks = monthMatrix(anchor);
  return `

          ? `<div class="helper" style="color:var(--negative); font-weight:700; margin-top:-6px;">End date must be on or after the start date</div>` : ''}

      </div>
      <div class="legend">
        <div class="legend-item"><span class="legend-swatch approved"></span>Approved</div>
        <div class="legend-item"><span class="legend-swatch sentback"></span>Sent Back</div>
        <div class="legend-item"><span class="legend-swatch awaiting"></span>Awaiting Approval</div>
        <div class="legend-item"><span class="legend-swatch info"></span>Additional Info</div>
      </div>
    `}
    <div class="link-row">
      <button class="link-btn" onclick="openSheet('balances')">${svg('wallet',15)} View Balances</button>
      <button class="link-btn" onclick="openSheet('teams')">${svg('users',15)} View Teams</button>
    </div>
    <div style="padding:4px 16px 4px;">
      <button class="btn-primary" ${canContinue()?'':'disabled'} onclick="openTimeOffDetails()">Continue${selectionCount()?` (${selectionCount()} day${selectionCount()>1?'s':''})`:''}</button>
    </div>
  `;
}
function selectionCount(){
  if(state.todSelMode==='range'){
    if(!state.todRangeStart || !state.todRangeEnd) return 0;
    // ISO yyyy-mm-dd strings compare correctly lexicographically
    if(state.todRangeEnd < state.todRangeStart) return 0;
    return daysBetween(state.todRangeStart, state.todRangeEnd);
  }
  return state.todSelectedDays.length;
}
function canContinue(){ return selectionCount()>0; }
function daysBetween(a,b){ const da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00'); return Math.max(1, Math.round((db-da)/86400000)+1); }
function renderCalDay(d){
  if(!d) return `<div class="cal-day blank"></div>`;
  const iso = fmtISO(d);
  const status = statusForDate(iso);
  const isPicked = state.todSelectedDays.includes(iso);
  const isToday = sameDate(d,TODAY);
  const hasInfo = !!HOLIDAYS[iso];
  let cls='';
  if(isPicked) cls='picked'; else if(status) cls=status;
  return `<div class="cal-day ${cls} ${isToday?'today':''}" onclick="toggleDay('${iso}')" title="${HOLIDAYS[iso]||''}">
    <div class="num-wrap">${d.getDate()}</div>
    ${hasInfo?'<div class="infodot"></div>':''}
  </div>`;
}
function toggleDay(iso){
  const status = statusForDate(iso);
  if(status){ openManageEntryFromDate(iso); return; }
  const i = state.todSelectedDays.indexOf(iso);
  if(i>-1) state.todSelectedDays.splice(i,1); else state.todSelectedDays.push(iso);
  document.getElementById('screenContent').innerHTML = screenTimeOff();
}
function setSelMode(m){ state.todSelMode=m; state.todSelectedDays=[]; document.getElementById('screenContent').innerHTML=screenTimeOff(); }
function setRangeDate(which,val){
  if(which==='start') state.todRangeStart=val; else state.todRangeEnd=val;
  // Re-render so the Continue button re-evaluates its enabled state
  document.getElementById('screenContent').innerHTML = screenTimeOff();
}
function shiftMonth(n){ state.todMonthOffset+=n; document.getElementById('screenContent').innerHTML=screenTimeOff(); }

function selectedDatesList(){
  if(state.todSelMode==='range'){
    if(!state.todRangeStart||!state.todRangeEnd) return [];
    const list=[]; let cur=new Date(state.todRangeStart+'T00:00:00'); const end=new Date(state.todRangeEnd+'T00:00:00');
    while(cur<=end){ list.push(fmtISO(cur)); cur=addDays(cur,1); }
    return list;
  }
  return [...state.todSelectedDays].sort();
}

    <div class="mini-stat-row"><span class="msl">Remaining Balance</span><span class="msv" id="rd_remain">${daysLabel(remaining)}</span></div>
  `;
  document.getElementById('sheetFooter').innerHTML = `<button class="btn-primary" onclick="saveRequestDay('${reqId}', ${idx})">Save Day</button>`;
}
function previewDayBalance(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  const type = document.getElementById('rd_type').value;
  const hours = parseFloat(document.getElementById('rd_hours').value)||0;
  const bal = BALANCES.find(b=>b.plan.toLowerCase().includes(type.toLowerCase())) || {plan:type, hours:0};
  const otherTotal = r.days.reduce((s,dd,i)=> i===idx? s : s+dd.hours, 0);
  document.getElementById('rd_avail').textContent = daysLabel(bal.hours);
  document.getElementById('rd_remain').textContent = daysLabel(bal.hours-otherTotal-hours);
}
function saveRequestDay(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  r.days[idx] = {...r.days[idx], type:document.getElementById('rd_type').value, hours:parseFloat(document.getElementById('rd_hours').value)||0};
  sheetEditIndividualDays({reqId});
}
function deleteRequestDay(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  r.days.splice(idx,1);
  if(r.days.length===0){ toRequests = toRequests.filter(x=>x.id!==reqId); closeSheet(); document.getElementById('screenContent').innerHTML=screenTimeOff(); toast('All days removed · request deleted','success'); return; }
  r.start = r.days[0].date; r.end = r.days[r.days.length-1].date;
  sheetEditIndividualDays({reqId});
}
function submitEditedRequest(reqId){
  const r = toRequests.find(x=>x.id===reqId);
  r.status = 'awaiting';
  closeSheet();
  refreshActiveScreen();
  toast('Edits submitted for approval','success');
}
/* Re-render whichever tab is currently showing, plus the nav (inbox badge) */
function refreshActiveScreen(){
  renderBottomNav();
  const el = document.getElementById('screenContent');
  if(state.tab==='timeoff') el.innerHTML = screenTimeOff();
  else if(state.tab==='requests') el.innerHTML = screenRequests();
  else render();
}
