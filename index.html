/* ================================================================
   APPROVALS — team timesheets + time off awaiting Daniel's decision
   ================================================================ */
function daysCountInclusive(startISO,endISO){
  const s=new Date(startISO+'T00:00:00'), e=new Date(endISO+'T00:00:00');
  return Math.round((e-s)/86400000)+1;
}
function ageLabel(date){
  if(!date) return '';
  const ms = Date.now() - date.getTime();
  const mins = Math.floor(ms/60000);
  if(mins<1) return 'just now';
  if(mins<60) return `${mins} minute${mins===1?'':'s'} ago`;
  const hrs = Math.floor(mins/60);
  if(hrs<24) return `${hrs} hour${hrs===1?'':'s'} ago`;
  const days = Math.floor(hrs/24);
  if(days<7) return `${days} day${days===1?'':'s'} ago`;
  const weeks = Math.floor(days/7);
  return `${weeks} week${weeks===1?'':'s'} ago`;
}
function daysSince(date){ if(!date) return 0; return Math.floor((Date.now()-date.getTime())/86400000); }
function teamApprovalItems(){
  const items = [];
  for(const m of TEAM_MEMBERS){
    const st = m.timesheet.status;
    if(st==='submitted' || st==='approved' || st==='sentback' || st==='denied'){
      items.push({
        kind:'timesheet', workerId:m.id, reqId:null, weekOffset:0,
        title:'Weekly Timesheet',
        subLabel: weekRangeLabel(m.timesheet.days),
        submittedAt: m.timesheet.submittedAt,
        hours: teamMemberWeekTotal(m),
        status: st==='submitted' ? 'pending' : st,
        stale: st==='submitted' && daysSince(m.timesheet.submittedAt) >= 7,
      });
    }
    // Decided past weeks — this is what populates History with real
    // Approved / Sent Back / Denied examples (never pending, already resolved).
    (m.pastWeeks||[]).forEach((pw,idx)=>{
      items.push({
        kind:'timesheet', workerId:m.id, reqId:null, weekOffset:idx+1,
        title:'Weekly Timesheet',
        subLabel: weekRangeLabel(pw.days),
        submittedAt: pw.submittedAt,
        hours: pw.days.reduce((s,d)=>s+(d.hours||0),0),
        status: pw.status,
        stale: false,
      });
    });
    for(const r of m.timeOff){
      const dCount = r.days ? r.days.length : daysCountInclusive(r.start,r.end);
      const hrs = r.days ? r.days.reduce((s,d)=>s+d.hours,0) : dCount*r.dailyHours;
      items.push({
        kind:'timeoff', workerId:m.id, reqId:r.id, weekOffset:0,
        title:r.type+' Time Off',
        subLabel: fmtRange(new Date(r.start+'T00:00:00'), new Date(r.end+'T00:00:00')) + ' · ' + daysLabel(hrs),
        submittedAt: r.submittedAt,
        hours: hrs,
        status: r.status==='awaiting' ? 'pending' : r.status,
        stale: r.status==='awaiting' && daysSince(r.submittedAt) >= 7,
      });
    }
  }
  return items;
}
function screenApprovals(){
  const items = teamApprovalItems();
  let pending = items.filter(i=>i.status==='pending');
  let history = items.filter(i=>i.status!=='pending');

  // Type filter (shared by both tabs)
  const typeF = state.apprTypeFilter || 'all';
  if(typeF!=='all'){ pending = pending.filter(i=>i.kind===typeF); history = history.filter(i=>i.kind===typeF); }

  // Pending: stale (>=1 week old) first, then newest-submitted first
  pending.sort((a,b)=>{
    if(a.stale !== b.stale) return a.stale ? -1 : 1;
    const at=a.submittedAt?a.submittedAt.getTime():0, bt=b.submittedAt?b.submittedAt.getTime():0;
    return a.stale ? at-bt : bt-at; // oldest-first among stale, newest-first among fresh
  });

  // History: date + status filters
  const dateF = state.apprDateFilter || 'all';
  if(dateF!=='all'){
    const cutoffDays = {7:7, 14:14, 30:30}[dateF];
    history = history.filter(i => i.submittedAt && daysSince(i.submittedAt) <= cutoffDays);
  }
  const statusF = state.apprStatusFilter || 'all';
  if(statusF!=='all') history = history.filter(i=>i.status===statusF);
  history.sort((a,b)=>{ const at=a.submittedAt?a.submittedAt.getTime():0, bt=b.submittedAt?b.submittedAt.getTime():0; return bt-at; });

  const list = state.apprTab==='pending' ? pending : history;
  const staleCount = pending.filter(i=>i.stale).length;

  return `
    <div class="subtabs">
      <div class="subtab ${state.apprTab==='pending'?'active':''}" onclick="setApprTab('pending')">Pending${items.filter(i=>i.status==='pending').length?` (${items.filter(i=>i.status==='pending').length})`:''}</div>
      <div class="subtab ${state.apprTab==='history'?'active':''}" onclick="setApprTab('history')">History</div>
    </div>
    <div class="section" style="padding:12px 16px 0;">
      <div style="display:flex; gap:8px; ${state.apprTab==='history'?'margin-bottom:8px;':''}">
        <select class="filter-select" style="flex:1;" onchange="state.apprTypeFilter=this.value; document.getElementById('screenContent').innerHTML=screenApprovals();">
          <option value="all" ${typeF==='all'?'selected':''}>All types</option>
          <option value="timesheet" ${typeF==='timesheet'?'selected':''}>Time Entry</option>
          <option value="timeoff" ${typeF==='timeoff'?'selected':''}>Time Off</option>
        </select>
        ${state.apprTab==='pending' ? '' : `
        <select class="filter-select" style="flex:1;" onchange="state.apprDateFilter=this.value; document.getElementById('screenContent').innerHTML=screenApprovals();">
          <option value="all" ${dateF==='all'?'selected':''}>All dates</option>
          <option value="7" ${dateF==='7'?'selected':''}>Last 7 days</option>
          <option value="14" ${dateF==='14'?'selected':''}>Last 14 days</option>
          <option value="30" ${dateF==='30'?'selected':''}>Last 30 days</option>
        </select>`}
      </div>
      ${state.apprTab==='history' ? `
      <select class="filter-select" style="width:100%;" onchange="state.apprStatusFilter=this.value; document.getElementById('screenContent').innerHTML=screenApprovals();">
        <option value="all" ${statusF==='all'?'selected':''}>All statuses</option>
        <option value="approved" ${statusF==='approved'?'selected':''}>Approved</option>
        <option value="sentback" ${statusF==='sentback'?'selected':''}>Sent Back</option>
        <option value="denied" ${statusF==='denied'?'selected':''}>Denied</option>
      </select>` : ''}
    </div>
    ${state.apprTab==='pending' && staleCount>0 ? `
      <div class="section" style="padding:10px 16px 0;">
        <div class="helper" style="margin:0; color:var(--negative); font-weight:700;">${svg('flag',13)} ${staleCount} request${staleCount>1?'s':''} waiting a week or more — shown first in red</div>
      </div>` : ''}
    ${state.apprTab==='pending' && pending.length ? `
      <div class="section" style="padding:8px 16px 0;">
        <div class="helper" style="margin:0;">${svg('inbox',13)} Tap a card to review details before deciding, or act directly below.</div>
      </div>` : ''}
    <div class="section" style="padding-top:12px;">
      ${list.length ? list.map(it=>apprCard(it)).join('') : `
        <div class="empty-state">
          ${svg(state.apprTab==='pending'?'checkCircle':'inbox',36)}
          <p>${state.apprTab==='pending' ? "You're all caught up — nothing waiting" : 'No matching history'}</p>
        </div>`}
    </div>
  `;
}

/* ---- Approve / Send back / Deny decision sheet ---- */
function decideApproval(kind, workerId, reqId, decision, weekOffset){
  openSheet('approvalDecision', {kind, workerId, reqId, decision, weekOffset: weekOffset||0});
}
function sheetApprovalDecision(ctx){
  const m = teamMember(ctx.workerId);
  const week = ctx.kind==='timesheet' ? resolveWeek(m, ctx.weekOffset||0) : null;
  const label = ctx.decision==='approved'?'Approve':ctx.decision==='sentback'?'Send Back':'Deny';
  document.getElementById('sheetTitle').textContent = `${label} — ${ctx.kind==='timesheet'?'Timesheet':'Time Off'}`;
  document.getElementById('sheetBody').innerHTML = `
    <div class="helper" style="margin-bottom:14px;">${m.name} · ${ctx.kind==='timesheet' && week ? weekRangeLabel(week.days) : 'Time off request'}</div>
    ${ctx.decision==='approved' ? `<div class="helper" style="margin-bottom:14px;">This finalizes the ${ctx.kind==='timesheet'?'timesheet':'request'} and routes it for processing.</div>` : ''}
    <div class="field">
      <label>Comment ${ctx.decision!=='approved'?'<span class="req">* required</span>':'<span style="font-weight:500; color:var(--text-3);">(optional)</span>'}</label>
      <textarea id="apprNote" placeholder="${ctx.decision==='sentback'?'Explain what needs to change…':ctx.decision==='denied'?'Explain why this is being denied…':'Add a note (optional)…'}"></textarea>
    </div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `
    <div class="btn-row" style="padding:0;">
      <button class="btn-secondary" onclick="closeSheet()">Cancel</button>
      <button class="${ctx.decision==='approved'?'btn-primary':'btn-danger-outline'}" style="flex:1;" onclick="confirmApprovalDecision()">Confirm</button>
    </div>
  `;
}
function confirmApprovalDecision(){
  const ctx = state.sheetCtx;
  const m = teamMember(ctx.workerId);
  const noteEl = document.getElementById('apprNote');
  const note = noteEl ? noteEl.value.trim() : '';
  if((ctx.decision==='sentback' || ctx.decision==='denied') && !note){
    toast(`A comment is required to ${ctx.decision==='sentback'?'send back':'deny'} this request`,'warn');
    return;
  }
  if(ctx.kind==='timesheet'){
    const week = resolveWeek(m, ctx.weekOffset||0);
    if(week){ week.status = ctx.decision; week.managerComment = note; }
  } else {
    const r = m.timeOff.find(x=>x.id===ctx.reqId);
    if(r){
      const wasApproved = r.status==='approved';
      r.status = ctx.decision;
      r.comment = note;
      const nowApproved = r.status==='approved';
      if(wasApproved !== nowApproved){
        const hrs = r.days ? r.days.reduce((s,d)=>s+d.hours,0) : daysCountInclusive(r.start,r.end)*r.dailyHours;
        m.balance += nowApproved ? -hrs : hrs; // deduct on approval, restore if un-approved later
      }
    }
  }
  closeSheet();
  const msg = ctx.decision==='approved' ? `${ctx.kind==='timesheet'?'Timesheet':'Request'} approved` : ctx.decision==='sentback' ? `Sent back to ${m.name.split(' ')[0]}` : 'Denied';
  toast(msg,'success');
  renderBottomNav();
  if(state.tab==='approvals') document.getElementById('screenContent').innerHTML = screenApprovals();
  if(state.tab==='home') document.getElementById('screenContent').innerHTML = screenHome();
  if(state.tab==='teamMember') document.getElementById('screenContent').innerHTML = screenTeamMember();
  if(state.tab==='team') document.getElementById('screenContent').innerHTML = screenTeam();
}

function apprDraftEdit(i,key,val){ apprDraft[i][key]=val; }
function apprDraftRegenerateDays(workerId, reqId){
  const m = teamMember(workerId);
  const r = m.timeOff.find(x=>x.id===reqId);
  const start = document.getElementById('cto_start').value;
  const end = document.getElementById('cto_end').value;
  if(!start || !end){ toast('Choose both a start and end date','warn'); return; }
  if(end<start){ toast('End date must be on or after the start date','warn'); return; }
  const defaultType = apprDraft[0] ? apprDraft[0].type : r.type;
  const defaultHours = apprDraft[0] ? apprDraft[0].hours : r.dailyHours;
  const days = [];
  let cur = new Date(start+'T00:00:00'); const endD = new Date(end+'T00:00:00');
  while(cur<=endD){ const dow=cur.getDay(); if(dow!==0 && dow!==6) days.push({date: fmtHuman(cur), type:defaultType, hours:defaultHours}); cur=addDays(cur,1); }
  if(!days.length){ toast('Selected range has no working days','warn'); return; }
  r.start = start; r.end = end;
  apprDraft = days;
  toast('Dates updated — review the days below','success');
  sheetApprovalDetail(state.sheetCtx);
}

  document.getElementById('sheetFooter').innerHTML = `
    <div class="btn-row" style="padding:0;">
      <button class="btn-secondary" onclick="cancelApprTimeSpinner()">Cancel</button>
      <button class="btn-primary" onclick="confirmApprTimeSpinner()">Done</button>
    </div>
  `;
  requestAnimationFrame(()=>{
    setSpinnerScroll('sp_hour', hourIdx);
    setSpinnerScroll('sp_min', minIdx);
    setSpinnerScroll('sp_ampm', ampmIdx);
  });
}
function cancelApprTimeSpinner(){
  const {returnSheet, returnCtx} = apprSpinnerCtx;
  apprSpinnerCtx = null;
  openSheet(returnSheet, returnCtx);
}
function confirmApprTimeSpinner(){
  const hourIdx = Math.min(Math.max(readSpinnerIndex('sp_hour'),0),11);
  const minIdx = Math.min(Math.max(readSpinnerIndex('sp_min'),0),59);
  const ampmIdx = Math.min(Math.max(readSpinnerIndex('sp_ampm'),0),1);
  const hour12 = hourIdx+1;
  const minute = minIdx;
  const ampm = ampmIdx>=1 ? 'PM':'AM';
  let hour24 = hour12%12; if(ampm==='PM') hour24+=12;
  const {dayIdx, which, returnSheet, returnCtx} = apprSpinnerCtx;
  apprDraft[dayIdx][which] = `${String(hour24).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  // Recompute hours if both in/out are set on a worked entry
  const d = apprDraft[dayIdx];
  if(d.in && d.out && !TIMEOFF_TYPES.includes(d.type)){
    const mins = timeToMin(d.out) - timeToMin(d.in);
    if(mins>0) d.hours = Math.round((mins/60)*100)/100;
  }
  apprSpinnerCtx = null;
  openSheet(returnSheet, returnCtx);
}
function apprDraftRemoveDay(i){
  apprDraft.splice(i,1);
  if(state.sheet==='teamEnterTime') sheetTeamEnterTime(state.sheetCtx);
  else sheetApprovalDetail(state.sheetCtx);
}
function saveApprDraft(workerId, reqId, weekOffset){
  const m = teamMember(workerId);
  if(reqId){
    const r = m.timeOff.find(x=>x.id===reqId);
    const before = r.days.reduce((s,d)=>s+d.hours,0);
    r.days = apprDraft.map(d=>({...d}));
    if(r.status==='approved'){
      const after = r.days.reduce((s,d)=>s+d.hours,0);
      if(after!==before) m.balance += (before - after); // more days off = balance drops further
    }
  } else {
    const week = resolveWeek(m, weekOffset||0);
    if(week) week.days = apprDraft.map(d=>({...d}));
  }
  toast('Changes saved','success');
  if(state.tab==='approvals') document.getElementById('screenContent').innerHTML = screenApprovals();
  if(state.tab==='teamMember') document.getElementById('screenContent').innerHTML = screenTeamMember();
}

   parse it back to a real date so calendar views can index by ISO correctly. */
function parseHumanDate(str){

  if(!m) return null;
  const monIdx = MON.findIndex(mn=>mn.slice(0,3)===m[1]);

  return new Date(TODAY.getFullYear(), monIdx, parseInt(m[2]));
}
function timeOffDaysISO(r){
  if(r.days) return r.days.map(d=>{ const dt=parseHumanDate(d.date); return dt?fmtISO(dt):null; }).filter(Boolean);
  const list=[]; let cur=new Date(r.start+'T00:00:00'); const end=new Date(r.end+'T00:00:00');
  while(cur<=end){ list.push(fmtISO(cur)); cur=addDays(cur,1); }
  return list;
}

function overviewRowData(m, offset, dates){

  const source = offset===0 ? m.timesheet : (m.pastWeeks && m.pastWeeks[offset-1]);
  const byDow = {};
  if(source) source.days.forEach(d=>{ byDow[d.date]=d; });
  const todayISO = fmtISO(TODAY);
  const cells = dates.map((dt,i)=>{
    const dn = dowNames[i];
    const iso = fmtISO(dt);
    const isFuture = offset===0 && iso>todayISO;
    const entry = (!isFuture && byDow[dn]) ? byDow[dn] : null;
    return {dow:dn, entry};
  });
  const total = cells.reduce((s,c)=> s + (c.entry && !c.entry.missed ? (c.entry.hours||0) : 0), 0);
  // The live current week is always still in progress — it can't already be
  // Submitted/Approved, so its status is forced regardless of the underlying demo data.
  const status = offset===0 ? 'none' : (source ? source.status : null);
  return {cells, total, status, hasSource: !!source};

/* ---- Weekly hours breakdown by category + review before saving ---- */
function categorizeHours(days){
  const cat = {regular:0, overtime:0, double:0, holiday:0, timeoff:0, other:0};
  for(const d of days){
    const h = d.hours||0;
    if(d.type==='Regular Hours Worked') cat.regular+=h;
    else if(d.type==='Overtime') cat.overtime+=h;
    else if(d.type==='Double Time') cat.double+=h;
    else if(d.type==='Holiday') cat.holiday+=h;
    else if(TIMEOFF_TYPES.includes(d.type)) cat.timeoff+=h;
    else cat.other+=h;
  }
  cat.total = cat.regular+cat.overtime+cat.double+cat.holiday+cat.timeoff+cat.other;
  return cat;
}
function openTeamReviewEntries(workerId){ openSheet('teamReviewEntries', {workerId}); }

      <div class="kv-row"><span class="kl">Other</span><span class="kv">${fmtHrs(cat.other)} h</span></div>
      <div class="kv-row" style="border-top:1px solid var(--border); margin-top:6px; padding-top:8px;"><span class="kl" style="font-weight:800;">Total</span><span class="kv" style="font-weight:800; color:var(--brand);">${fmtHrs(cat.total)} h</span></div>
    </div>
    ${changedDays.length ? `

        ${o ? cmpRow('Type', o.type, d.type) : `<div class="kv-row"><span class="kl">Type</span><span class="kv">${d.type}</span></div>`}

  document.getElementById('sheetTitle').textContent = 'Enter Time Off — '+m.name.split(' ')[0];
  document.getElementById('sheetBody').innerHTML = `
    <div class="helper" style="margin-bottom:14px;">Balance available: ${daysLabel(m.balance)}</div>
    <div class="field"><label>Type</label><select id="tto_type">${TIMEOFF_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="field-row">
      <div class="field"><label>Start date</label><input type="date" id="tto_start" value="${defStart}" onchange="document.getElementById('tto_end').min=this.value;"></div>
      <div class="field"><label>End date</label><input type="date" id="tto_end" min="${defStart}" value="${defStart}"></div>
    </div>
    <div class="field"><label>Daily hours</label><input type="number" id="tto_hrs" value="8" step="0.5"></div>
    <div class="field"><label>Comment <span style="font-weight:500; color:var(--text-3);">(optional)</span></label><textarea id="tto_comment" placeholder="Add context…"></textarea></div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `<button class="btn-primary" onclick="reviewTeamTimeOff('${ctx.workerId}')">${svg('check',15)} Review &amp; Submit</button>`;
}
let teamTimeOffDraft = null;
function reviewTeamTimeOff(workerId){
  const type = document.getElementById('tto_type').value;
  const start = document.getElementById('tto_start').value;
  const end = document.getElementById('tto_end').value || start;
  const hrs = parseFloat(document.getElementById('tto_hrs').value)||8;
  const comment = document.getElementById('tto_comment').value;
  if(!start){ toast('Choose a start date','warn'); return; }
  if(end<start){ toast('End date must be on or after the start date','warn'); return; }
  const days = [];
  let cur = new Date(start+'T00:00:00'); const endD = new Date(end+'T00:00:00');
  while(cur<=endD){ const dow=cur.getDay(); if(dow!==0 && dow!==6) days.push({date: fmtHuman(cur), type, hours:hrs}); cur = addDays(cur,1); }
  if(!days.length){ toast('Selected range has no working days','warn'); return; }
  teamTimeOffDraft = {workerId, type, start, end, hrs, comment, days};
  openSheet('teamTimeOffReview', {workerId});
}
function sheetTeamTimeOffReview(ctx){
  const m = teamMember(ctx.workerId);
  const d = teamTimeOffDraft;
  const total = d.days.reduce((s,x)=>s+x.hours,0);
  document.getElementById('sheetTitle').textContent = 'Review & Submit';
  document.getElementById('sheetBody').innerHTML = `
    <div class="helper" style="margin-bottom:12px;">${m.name} · ${d.type}</div>
    <div class="kv-card" style="margin-bottom:14px;">
      <div class="kv-row"><span class="kl">Dates</span><span class="kv">${fmtRange(new Date(d.start+'T00:00:00'), new Date(d.end+'T00:00:00'))}</span></div>
      <div class="kv-row"><span class="kl">Total requested</span><span class="kv">${daysLabel(total)} · ${fmtHrs(total)} hrs</span></div>
      <div class="kv-row"><span class="kl">Available balance</span><span class="kv" style="color:var(--positive);">${daysLabel(m.balance)}</span></div>
      <div class="kv-row"><span class="kl">Balance after</span><span class="kv">${daysLabel(Math.max(m.balance-total,0))}</span></div>
    </div>
    <div class="section-title" style="padding:0 0 8px;">Days</div>
    <div class="kv-card" style="margin-bottom:14px;">
      ${d.days.map(x=>`<div class="kv-row"><span class="kl">${x.date}</span><span class="kv">${x.type} · ${fmtHrs(x.hours)} h</span></div>`).join('')}
    </div>
    ${d.comment ? `<div class="helper">Comment: "${d.comment}"</div>` : ''}
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `
    <button class="btn-secondary" style="margin-bottom:8px;" onclick="openSheet('teamRequestTimeOff',{workerId:'${ctx.workerId}'})">${svg('chevronLeft',14)} Back to edit</button>
    <button class="btn-primary" onclick="confirmTeamTimeOff()">${svg('check',15)} Confirm &amp; Submit</button>
  `;
}
function confirmTeamTimeOff(){
  const d = teamTimeOffDraft;
  const m = teamMember(d.workerId);
  m.timeOff.unshift({id:'to_'+cuid(), type:d.type, start:d.start, end:d.end, dailyHours:d.hrs, status:'awaiting', comment:d.comment, days:d.days, submittedAt:new Date()});
  teamTimeOffDraft = null;
  toast(`Time off entered for ${m.name.split(' ')[0]}`,'success');
  closeSheet();
  if(state.tab==='teamMember') document.getElementById('screenContent').innerHTML = screenTeamMember();
}

/* ---- Correct an existing time off request ---- */
function sheetTeamCorrectTimeOff(ctx){
  const m = teamMember(ctx.workerId);
  document.getElementById('sheetTitle').textContent = 'Correct Time Off — '+m.name.split(' ')[0];
  document.getElementById('sheetBody').innerHTML = m.timeOff.length ? `
    <div class="day-chip-list">
      ${m.timeOff.map(r=>`
        <div class="day-chip" onclick="closeSheet(); openApprovalDetail('timeoff','${m.id}','${r.id}');">
          <div class="dc-left"><div class="dc-date">${r.type}</div><div class="dc-meta">${fmtRange(new Date(r.start+'T00:00:00'), new Date(r.end+'T00:00:00'))}</div></div>
          <span class="badge ${apprStatusMeta(r.status==='awaiting'?'pending':r.status).cls}">${apprStatusMeta(r.status==='awaiting'?'pending':r.status).label}</span>
        </div>`).join('')}
    </div>` : `<div class="helper" style="text-align:center; padding:14px 0;">No time off requests on file for ${m.name.split(' ')[0]} yet.</div>`;
  document.getElementById('sheetFooter').style.display='none';
}

/* ---- View time off balance + history (read-only) ---- */
function sheetTeamViewTimeOff(ctx){
  const m = teamMember(ctx.workerId);
  document.getElementById('sheetTitle').textContent = 'Time Off — '+m.name.split(' ')[0];
  document.getElementById('sheetBody').innerHTML = `
    <div class="kv-card">
      <div class="kv-row"><span class="kl">Available balance</span><span class="kv" style="color:var(--positive);">${daysLabel(m.balance)}</span></div>
    </div>
    <div class="section-title" style="padding:4px 0 8px;">Requests</div>
    ${m.timeOff.length ? m.timeOff.map(r=>{
      const meta = apprStatusMeta(r.status==='awaiting'?'pending':r.status);
      return `<div class="list-row">
        <div class="lr-icon" style="background:var(--brand-tint); color:var(--brand);">${svg('calendar',16)}</div>
        <div class="lr-body"><div class="lr-title">${r.type}</div><div class="lr-sub">${fmtRange(new Date(r.start+'T00:00:00'), new Date(r.end+'T00:00:00'))}</div></div>
        <span class="badge ${meta.cls}">${meta.label}</span>
      </div>`;
    }).join('') : `<div class="helper" style="text-align:center; padding:10px 0;">No requests on file.</div>`}
  `;
  document.getElementById('sheetFooter').style.display='none';
}

const SHEETS = {
  addEntry: sheetAddEntry,
  monthlyTimesheet: sheetMonthlyTimesheet,
  checkoutMeal: sheetCheckoutMeal,
  timeOffDetails: sheetTimeOffDetails,
  balances: sheetBalances,
  teams: sheetTeams,
  actionsMenu: sheetActionsMenu,
  editTimeOff: sheetEditTimeOff,
  editIndividualDays: sheetEditIndividualDays,
  quickLeave: sheetQuickLeave,
  confirmCancelSick: sheetConfirmCancelSick,
  approvalDecision: sheetApprovalDecision,
  approvalDetail: sheetApprovalDetail,
  teamEnterTime: sheetTeamEnterTime,
  teamRequestTimeOff: sheetTeamRequestTimeOff,
  teamCorrectTimeOff: sheetTeamCorrectTimeOff,
  teamViewTimeOff: sheetTeamViewTimeOff,
  teamLeaveDay: sheetTeamLeaveDay,
  teamReviewEntries: sheetTeamReviewEntries,
  teamTimeOffReview: sheetTeamTimeOffReview,
  teamWeeklyOverview: sheetTeamWeeklyOverview,
  weekEntry: sheetWeekEntry,
};
function openSheet(name, ctx={}){
  state.sheet = name; state.sheetCtx = ctx;
  document.getElementById('sheetFooter').style.display='none';
  document.getElementById('sheetFooter').innerHTML='';
  SHEETS[name](ctx);
  document.getElementById('sheetOverlay').classList.add('open');
}
function closeSheet(){
  // If the user backs out of a week-day entry editor, return to that day's view
  if(state.sheet==='addEntry' && entryDraft && entryDraft.fromWeek && weekEditReturn){
    weekSheetDay = weekEditReturn;
    weekEditReturn = null; entryDraft = null;
    openSheet('weekEntry');
    return;
  }
  document.getElementById('sheetOverlay').classList.remove('open');
  state.sheet=null;
  entryDraft=null;
  apprDraft=null;
  apprDraftOriginal=null;
}
document.getElementById('sheetOverlay').addEventListener('click', (e)=>{ if(e.target.id==='sheetOverlay') closeSheet(); });

/* ================= Toast ================= */
let toastTimer=null;
function toast(msg, kind='success'){
  const el = document.getElementById('toast');
  const iconName = kind==='success' ? 'checkCircle' : kind==='warn' ? 'info' : 'info';
  el.innerHTML = `${svg(iconName,18)}<span>${msg}</span>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

render();
</script>
</body>
</html>
