/* ---- Monthly timesheet ---- */
function openMonthlyTimesheet(){
  // open on the month the user is currently looking at
  const wd = weekDates();
  state.tsMonth = wd[3].getMonth();
  state.tsYear  = wd[3].getFullYear();
  openSheet('monthlyTimesheet');
}
function setTsMonth(v){ state.tsMonth = parseInt(v,10); sheetMonthlyTimesheet(); }
function setTsYear(v){ state.tsYear = parseInt(v,10); sheetMonthlyTimesheet(); }
function shiftTsMonth(n){
  let m = state.tsMonth + n, y = state.tsYear;
  if(m < 0){ m = 11; y--; }
  if(m > 11){ m = 0; y++; }
  state.tsMonth = m; state.tsYear = y;
  sheetMonthlyTimesheet();
}
function sheetMonthlyTimesheet(){
  const anchor = new Date(state.tsYear, state.tsMonth, 1);
  const weeks = monthMatrix(anchor);
  const yearNow = TODAY.getFullYear();
  const years = [];
  for(let y = yearNow-3; y <= yearNow+1; y++) years.push(y);

  let monthHours = 0, daysWorked = 0;
  for(const w of weeks) for(const d of w){
    if(!d) continue;
    const h = dayTotal(fmtISO(d));
    if(h>0){ monthHours += h; daysWorked++; }
  }

  document.getElementById('sheetTitle').textContent = 'Monthly Timesheet';
  document.getElementById('sheetBody').innerHTML = `
    <div class="ts-controls">
      <button onclick="shiftTsMonth(-1)">${svg('chevronLeft',14)}</button>
      <select onchange="setTsMonth(this.value)">
        ${MON.map((m,i)=>`<option value="${i}" ${i===state.tsMonth?'selected':''}>${m}</option>`).join('')}
      </select>
      <select onchange="setTsYear(this.value)">
        ${years.map(y=>`<option value="${y}" ${y===state.tsYear?'selected':''}>${y}</option>`).join('')}
      </select>
      <button onclick="shiftTsMonth(1)">${svg('chevronRight',14)}</button>
    </div>

    <div class="kv-card" style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:11.5px; color:var(--text-3); font-weight:700;">${MON[state.tsMonth]} ${state.tsYear} total</div>
        <div style="font-size:19px; font-weight:800; color:var(--brand); font-family:'Poppins',sans-serif;">${monthHours.toFixed(1)} hrs</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11.5px; color:var(--text-3); font-weight:700;">Days worked</div>
        <div style="font-size:19px; font-weight:800; font-family:'Poppins',sans-serif;">${daysWorked}</div>
      </div>
    </div>

    <div class="ts-dow">${DOW.map(d=>`<div>${d[0]}</div>`).join('')}</div>
    <div class="ts-grid">
      ${weeks.flat().map(d=>{
        if(!d) return `<div class="ts-day blank"></div>`;
        const iso = fmtISO(d);
        const h = dayTotal(iso);
        const isToday = sameDate(d, TODAY);
        const wknd = d.getDay()===0 || d.getDay()===6;
        return `<div class="ts-day ${h>0?'has':''} ${isToday?'today':''} ${wknd?'weekend':''}" onclick="openDayFromTimesheet('${iso}')">
          <div class="tsd-num">${d.getDate()}</div>
          <div class="tsd-hrs">${h>0 ? h.toFixed(1) : ''}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="ts-legend">
      <span><i class="ts-sw"></i> Time logged</span>
      <span><i class="ts-sw none"></i> No entries</span>
    </div>
    <div class="helper" style="text-align:center; margin-top:10px;">Tap any day to open it on the Enter Time calendar</div>
  `;
  document.getElementById('sheetFooter').style.display='none';
}
function openDayFromTimesheet(iso){
  state.weekOffset = weekOffsetFor(iso);
  state.selectedDay = iso;
  closeSheet();
  state.tab = 'time';
  render();
}

/* ================= REQUESTS (My Requests + Inbox) ================= */
/* One unified list mixing time-off requests and submitted weekly timesheets. */
function allRequestItems(){
  const items = [];
  for(const r of toRequests){
    items.push({
      kind:'timeoff', id:r.id, title:r.type + ' Time Off',
      sub: fmtRange(new Date(r.start+'T00:00:00'), new Date(r.end+'T00:00:00')) + ' · ' + daysLabel(r.days.reduce((s,d)=>s+d.hours,0)),
      status:r.status, comment:r.comment, sortKey:r.start, ref:r
    });
  }
  for(const [wkKey, sub] of Object.entries(weekSubs)){
    const wd = [...Array(7)].map((_,i)=>addDays(new Date(wkKey+'T00:00:00'), i));
    const st = sub.status || 'submitted';
    const subline = st==='submitted'
      ? weekLabel(wd) + ' · submitted ' + sub.submittedLabel
      : weekLabel(wd) + ' · ' + (sub.decidedLabel || st);
    items.push({
      kind:'timesheet', id:'ts_'+wkKey,
      title:'Weekly Timesheet',
      sub: subline,
      status: st, comment: sub.managerComment || '', sortKey:wkKey, ref:{wkKey}
    });
  }
  // newest first
  return items.sort((a,b)=> a.sortKey < b.sortKey ? 1 : -1);
}
/* Inbox = items the manager sent back or denied that need the employee to act */
function inboxItems(){ return allRequestItems().filter(i=>i.status==='sentback' || i.status==='denied'); }

function reqStatusMeta(s){
  return {
    approved:  {label:'Approved',  cls:'approved'},
    sentback:  {label:'Sent back', cls:'sentback'},
    denied:    {label:'Denied',    cls:'denied'},
    awaiting:  {label:'Awaiting',  cls:'awaiting'},
    closed:    {label:'Closed',    cls:'closed'},
    submitted: {label:'Submitted', cls:'pending'}
  }[s] || {label:s, cls:'awaiting'};
}

function screenRequests(){
  const inboxCount = inboxItems().length;
  const items = state.reqInbox ? inboxItems() : allRequestItems();
  return `
    <div class="subtabs">
      <div class="subtab ${!state.reqInbox?'active':''}" onclick="setReqInbox(false)">All Requests</div>
      <div class="subtab ${state.reqInbox?'active':''}" onclick="setReqInbox(true)">
        Inbox${inboxCount>0?` (${inboxCount})`:''}
      </div>
    </div>

    ${state.reqInbox ? `
      <div class="section" style="padding:14px 16px 0;">
        <div class="helper" style="margin:0 0 12px;">${svg('inbox',13)} Items your manager sent back for changes. Open one to take action.</div>
      </div>` : ''}

    <div class="section" style="padding-top:12px;">
      ${items.length ? items.map(it=>reqCard(it)).join('') : `
        <div class="empty-state">
          ${svg(state.reqInbox?'checkCircle':'inbox',36)}
          <p>${state.reqInbox ? 'Inbox zero — nothing sent back' : 'No requests yet'}</p>
        </div>`}
    </div>
  `;
}
function setReqInbox(v){ state.reqInbox=v; renderHeader(); document.getElementById('screenContent').innerHTML = screenRequests(); }

function reqCard(it){
  const meta = reqStatusMeta(it.status);
  const icon = it.kind==='timesheet' ? 'clock' : 'calendar';
  return `
    <div class="card req-card" style="padding:13px; margin-bottom:10px; ${(it.status==='sentback'||it.status==='denied')?'border-color:var(--critical); border-left:4px solid var(--critical);':''}">
      <div style="display:flex; align-items:flex-start; gap:12px;">
        <div class="lr-icon" style="background:var(--brand-tint); color:var(--brand);">${svg(icon,16)}</div>
        <div style="flex:1; min-width:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <div class="lr-title">${it.title}</div>
            <span class="badge ${meta.cls}">${meta.label}</span>
          </div>
          <div class="lr-sub">${it.sub}</div>
          ${(it.status==='sentback'||it.status==='denied') && it.comment ? `
            <div class="sentback-note">${svg('info',12)} Manager: "${it.comment}"</div>` : ''}
        </div>
      </div>
      <div class="req-actions">${reqActions(it)}</div>
    </div>`;
}
function reqActions(it){
  if(it.kind==='timeoff'){
    if(it.status==='sentback'){
      return `
        <button class="req-act primary" onclick="reqEditTimeOff('${it.id}')">${svg('edit',13)} Edit &amp; resubmit</button>
        <button class="req-act danger" onclick="reqCancelTimeOff('${it.id}')">${svg('trash',13)} Cancel</button>`;
    }
    if(it.status==='awaiting'){
      return `
        <button class="req-act" onclick="reqViewTimeOff('${it.id}')">View</button>
        <button class="req-act danger" onclick="reqCancelTimeOff('${it.id}')">${svg('trash',13)} Withdraw</button>`;
    }
    if(it.status==='approved'){
      return `
        <button class="req-act" onclick="reqEditTimeOff('${it.id}')">${svg('edit',13)} Edit</button>
        <button class="req-act danger" onclick="reqCancelTimeOff('${it.id}')">${svg('trash',13)} Cancel</button>`;
    }
    if(it.status==='closed'){
      return `<button class="req-act" onclick="reqViewTimeOff('${it.id}')">${svg('check',13)} View details</button>`;
    }
  }
  if(it.kind==='timesheet'){
    const wk = it.ref.wkKey;
    if(it.status==='sentback'){
      return `
        <button class="req-act primary" onclick="reqOpenTimesheet('${wk}')">${svg('edit',13)} Edit &amp; resubmit</button>`;
    }
    if(it.status==='denied'){
      return `
        <button class="req-act primary" onclick="reqOpenTimesheet('${wk}')">${svg('edit',13)} Revise &amp; resubmit</button>`;
    }
    return `<button class="req-act" onclick="reqOpenTimesheet('${wk}')">${svg('clock',13)} View timesheet</button>`;
  }
  return '';
}
/* --- action routing --- */
function reqEditTimeOff(id){ openSheet('editTimeOff', {reqId:id}); }
function reqViewTimeOff(id){ openSheet('editTimeOff', {reqId:id}); }
function reqCancelTimeOff(id){
  const r = toRequests.find(x=>x.id===id);
  if(!r) return;
  cancelTimeOff(id);
}
function reqOpenTimesheet(wkKey){
  state.weekOffset = weekOffsetFor(wkKey);
  state.selectedDay = fmtISO(addDays(new Date(wkKey+'T00:00:00'), 1)); // that week's Monday
  setTab('time');
}
const SHEETS = {
  addEntry: sheetAddEntry,
  monthlyTimesheet: sheetMonthlyTimesheet,
  checkoutMeal: sheetCheckoutMeal,
  timeOffDetails: sheetTimeOffDetails,
  balances: sheetBalances,
  teams: sheetTeams,
  actionsMenu: sheetActionsMenu,
  editTimeOff: sheetEditTimeOff,
  editIndividualDays: sheetEditIndividualDays,
};
function openSheet(name, ctx={}){
  state.sheet = name; state.sheetCtx = ctx;
  document.getElementById('sheetFooter').style.display='none';
  document.getElementById('sheetFooter').innerHTML='';
  SHEETS[name](ctx);
  document.getElementById('sheetOverlay').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  state.sheet=null;
  entryDraft=null;
}
document.getElementById('sheetOverlay').addEventListener('click', (e)=>{ if(e.target.id==='sheetOverlay') closeSheet(); });

/* ================= Toast ================= */
let toastTimer=null;
function toast(msg, kind='success'){
  const el = document.getElementById('toast');
  const iconName = kind==='success' ? 'checkCircle' : kind==='warn' ? 'info' : 'info';
  el.innerHTML = `${svg(iconName,18)}<span>${msg}</span>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

render();
</script>
