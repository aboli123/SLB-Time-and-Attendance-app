<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time &amp; Absence — Employee Mobile Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#0014DC;
    --brand-dark:#00096E;
    --brand-tint:#E7E9FC;
    --accent:#FF7A45;
    --accent-tint:#FFEDE3;
    --bg:#F4F6F5;
    --card:#FFFFFF;
    --border:#E7EBE9;
    --text:#1E2A26;
    --text-2:#5C6B65;
    --text-3:#93A19B;
    --positive:#1E8A4C;
    --positive-bg:#E5F6EC;
    --critical:#C77700;
    --critical-bg:#FFF2DE;
    --neutral:#93A19B;
    --negative:#D14343;
    --negative-bg:#FCEAEA;
    --info-dot:#3D8BFF;
    --manual:#8A4FD1;
    --manual-bg:#F2E9FB;
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:24px;
    --shadow-1:0 1px 3px rgba(30,42,38,.07), 0 1px 1px rgba(30,42,38,.05);
    --shadow-2:0 10px 28px rgba(30,42,38,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Poppins','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#EEF2F0 0%,#DCE5E0 100%);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 16px 60px;
    color:var(--text);
  }
  .rig-label{ text-align:center; margin-bottom:22px; max-width:420px; }
  .rig-label .tag{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--text); color:#fff; font-size:11px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; padding:5px 10px; border-radius:20px;
    margin-bottom:10px;
  }
  .rig-label .tag svg{width:12px;height:12px;}
  .rig-label h1{font-size:19px; font-weight:800; letter-spacing:-.01em;}
  .rig-label p{font-size:13px; color:#55605B; margin-top:4px; line-height:1.5; font-family:'Inter',sans-serif;}

  .phone{
    width:390px; height:844px; background:#000; border-radius:52px; padding:14px;
    box-shadow:var(--shadow-2), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative;
  }
  .phone-screen{
    width:100%; height:100%; background:var(--bg); border-radius:38px; overflow:hidden;
    position:relative; display:flex; flex-direction:column;
  }
  .notch{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:26px; background:#000; border-radius:0 0 16px 16px; z-index:50; }
  .status-bar{
    height:46px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-size:14px; font-weight:600; color:var(--text); background:var(--bg); font-family:'Inter',sans-serif;
  }
  .status-icons{display:flex; align-items:center; gap:5px;}

  .app-header{
    flex:0 0 auto; background:var(--card); border-bottom:1px solid var(--border);
    padding:12px 16px 14px; display:flex; align-items:center; gap:10px;
  }
  .app-header .hbtn{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:transparent; border:none; cursor:pointer; color:var(--text); flex:0 0 auto; }
  .app-header .hbtn:active{background:var(--bg);}
  .slb-mark{flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,20,220,.22);}
  .slb-mark img{width:100%; height:100%; display:block; object-fit:cover;}

  /* ---- Login / SSO screen ---- */
  .login{
    flex:1; display:flex; flex-direction:column; padding:0 26px 30px;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(0,20,220,.10) 0%, rgba(0,20,220,0) 60%),
      var(--card);
    font-family:'Inter',sans-serif;
  }
  .login-top{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .login-logo{width:76px; height:76px; border-radius:20px; overflow:hidden; box-shadow:0 10px 26px rgba(0,20,220,.28); margin-bottom:22px;}
  .login-logo img{width:100%; height:100%; display:block; object-fit:cover;}
  .login h1{font-family:'Poppins',sans-serif; font-size:23px; font-weight:800; letter-spacing:-.02em;}
  .login .login-sub{font-size:13.5px; color:var(--text-2); margin-top:8px; line-height:1.55; max-width:250px;}
  .login-bottom{flex:0 0 auto;}
  .sso-btn{
    width:100%; padding:15px; border-radius:12px; border:none; background:var(--brand); color:#fff;
    font-weight:700; font-size:15px; cursor:pointer; box-shadow:0 8px 18px rgba(0,20,220,.3);
    display:flex; align-items:center; justify-content:center; gap:9px; font-family:'Poppins',sans-serif;
  }
  .sso-btn:disabled{opacity:.75; cursor:default;}
  .sso-note{display:flex; align-items:center; justify-content:center; gap:6px; font-size:11.5px; color:var(--text-3); font-weight:600; margin-top:14px;}
  .login-foot{text-align:center; font-size:10.5px; color:var(--text-3); margin-top:22px; line-height:1.6;}
  .spinner{
    width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff; animation:spin .7s linear infinite; flex:0 0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .app-header .htitle{flex:1; min-width:0;}
  .app-header .htitle .h-eyebrow{font-size:11px; color:var(--brand); font-weight:700; text-transform:uppercase; letter-spacing:.03em; font-family:'Inter',sans-serif;}
  .app-header .htitle h2{font-size:18px; font-weight:700; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .avatar{
    width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#0014DC,#3D5CFF);
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:0 0 auto;
  }

  .screen-content{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:24px; font-family:'Inter',sans-serif;}
  .screen-content::-webkit-scrollbar{width:0;}

  .bottom-nav{ flex:0 0 auto; display:flex; background:var(--card); border-top:1px solid var(--border); padding:8px 4px 16px; position:relative; z-index:30; }
  .nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; background:none; border:none; color:var(--text-3); cursor:pointer; }
  .nav-item svg{width:22px; height:22px;}
  .nav-item span{font-size:10.5px; font-weight:600; font-family:'Inter',sans-serif;}
  .nav-item.active{color:var(--brand);}
  .home-indicator{ position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:120px; height:4px; background:#1D2D3E; border-radius:3px; opacity:.25; }

  .section{padding:16px;}
  .section-title{font-size:12.5px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px; font-family:'Poppins',sans-serif;}
  .card{ background:var(--card); border-radius:var(--radius-md); box-shadow:var(--shadow-1); border:1px solid var(--border); padding:16px; }
  .card + .card{margin-top:12px;}

  .greet{padding:18px 16px 4px;}
  .greet .hi{font-size:13px; color:var(--text-3); font-weight:600;}
  .greet h1{font-size:21px; font-weight:800; letter-spacing:-.01em; font-family:'Poppins',sans-serif;}

  /* --- Zoho-style attendance / punch card --- */
  .attend-card{
    margin:14px 16px 0; border-radius:var(--radius-lg); padding:20px 18px 22px;
    background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow-1);
  }
  .attend-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .attend-head .a-label{font-size:11.5px; color:var(--text-3); font-weight:700; text-transform:uppercase; letter-spacing:.03em;}
  .attend-head .a-date{font-size:14px; font-weight:700; margin-top:1px;}
  .status-chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px; font-size:11px; font-weight:700; background:var(--positive-bg); color:var(--positive); }
  .status-chip.off{background:var(--critical-bg); color:var(--critical);}
  .status-chip.done{background:var(--brand-tint); color:var(--brand);}
  .status-chip .dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .punch-wrap{display:flex; flex-direction:column; align-items:center; padding:6px 0 4px;}
  .punch-circle{
    width:148px; height:148px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:conic-gradient(from 180deg, var(--brand), #3D5CFF, var(--brand)); color:#fff; cursor:pointer;
    box-shadow:0 12px 26px rgba(0,20,220,.32); position:relative; border:5px solid #fff; outline:2px solid var(--brand-tint);
  }
  .punch-circle.checked{ background:#fff; color:var(--text); outline:2px solid var(--positive); border:5px solid var(--positive-bg); box-shadow:0 8px 20px rgba(30,138,76,.18); cursor:default; }
  .punch-time{font-size:26px; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .punch-cta{font-size:12.5px; font-weight:700; margin-top:4px; text-transform:uppercase; letter-spacing:.03em; opacity:.92;}
  .punch-sub{font-size:12px; color:var(--text-3); font-weight:600; margin-top:12px; text-align:center;}

  .punch-actions{display:flex; gap:10px; margin-top:14px; width:100%;}
  .punch-actions button{ flex:1; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .punch-actions button.primary{background:var(--brand); color:#fff; border-color:var(--brand);}

  .meta-row{display:flex; gap:16px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);}
  .meta-row div{flex:1;}
  .meta-row .ml{font-size:11px; color:var(--text-3); font-weight:600; margin-bottom:2px;}
  .meta-row .mv{font-weight:700; font-size:13px;}

  .tile-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:18px 16px 6px;}
  .tile{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 6px 12px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; box-shadow:var(--shadow-1); }
  .tile:active{background:var(--brand-tint);}
  .tile .ticon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .tile span{font-size:10.5px; font-weight:700; text-align:center; color:var(--text-2); line-height:1.25;}

  .list-row{display:flex; align-items:center; gap:12px; padding:12px 0;}
  .list-row + .list-row{border-top:1px solid var(--border);}
  .list-row .lr-icon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .list-row .lr-body{flex:1; min-width:0;}
  .list-row .lr-title{font-size:13.5px; font-weight:700;}
  .list-row .lr-sub{font-size:12px; color:var(--text-3); margin-top:1px;}
  .badge{font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:20px; white-space:nowrap; font-family:'Inter',sans-serif;}
  .badge.approved{color:var(--positive); background:var(--positive-bg);}
  .badge.sentback{color:var(--critical); background:var(--critical-bg);}
  .badge.awaiting{color:var(--neutral); background:#EEF1F0;}
  .badge.pending{color:var(--brand); background:var(--brand-tint);}
  .badge.manual{color:var(--manual); background:var(--manual-bg);}

  .week-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px;}
  .week-nav button{background:var(--card); border:1px solid var(--border); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .week-nav .wn-label{font-size:15px; font-weight:700; font-family:'Poppins',sans-serif;}
  .week-strip{display:flex; gap:6px; padding:8px 16px 4px;}
  .day-cell{ flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:8px 2px 9px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
  .day-cell .dow{font-size:10px; font-weight:700; color:var(--text-3);}
  .day-cell .dnum{font-size:14px; font-weight:800;}
  .day-cell .dhrs{font-size:9.5px; font-weight:700; color:var(--brand); background:var(--brand-tint); border-radius:6px; padding:1px 5px; min-width:26px; text-align:center;}
  .day-cell .dhrs.zero{color:var(--text-3); background:transparent;}
  .day-cell.selected{border-color:var(--brand); background:var(--brand-tint);}
  .day-cell.today .dnum{color:var(--brand);}

  .week-total-bar{ margin:10px 16px 0; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:14px; display:flex; justify-content:space-between; align-items:center; }
  .week-total-bar .wt-label{font-size:12px; color:var(--text-3); font-weight:600;}
  .week-total-bar .wt-val{font-size:18px; font-weight:800; margin-top:1px; font-family:'Poppins',sans-serif;}

  .entry-row{ display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-left:4px solid var(--brand); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .entry-row.manual{border-left-color:var(--manual); background:linear-gradient(0deg,var(--manual-bg),var(--manual-bg)),var(--card);}
  .entry-row .er-time{font-size:13.5px; font-weight:700;}
  .entry-row .er-type{font-size:11.5px; color:var(--text-3); margin-top:1px; display:flex; align-items:center; gap:6px;}
  .entry-row .er-hrs{margin-left:auto; font-weight:800; font-size:13.5px; color:var(--brand); text-align:right;}

  .empty-state{text-align:center; padding:26px 20px; color:var(--text-3);}
  .empty-state svg{width:40px; height:40px; margin-bottom:8px; opacity:.5;}
  .empty-state p{font-size:13px; font-weight:600;}

  .btn-primary{ width:100%; padding:14px; border-radius:12px; border:none; background:var(--brand); color:#fff; font-weight:700; font-size:14.5px; cursor:pointer; box-shadow:0 6px 14px rgba(0,20,220,.28); font-family:'Poppins',sans-serif; }
  .btn-primary:disabled{background:#C3CBC7; box-shadow:none; cursor:default;}
  .btn-secondary{ width:100%; padding:13px; border-radius:12px; border:1.5px solid var(--border); background:#fff; color:var(--text); font-weight:700; font-size:14px; cursor:pointer; font-family:'Poppins',sans-serif; }
  .btn-danger-outline{ width:100%; padding:13px; border-radius:12px; border:1.5px solid var(--negative); background:#fff; color:var(--negative); font-weight:700; font-size:14px; cursor:pointer; font-family:'Poppins',sans-serif; }
  .btn-row{display:flex; gap:10px; padding:14px 16px 4px;}
  .btn-row > *{flex:1;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:6px;}
  .field label .req{color:var(--negative);}
  .field select, .field input[type=text], .field input[type=number], .field input[type=date], .field textarea{
    width:100%; padding:12px 12px; border-radius:10px; border:1.5px solid var(--border); font-size:14px;
    font-family:'Inter',sans-serif; background:#fff; color:var(--text); appearance:none;
  }
  .field select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C6B65' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; background-size:15px; padding-right:36px; cursor:pointer;
  }
  .field select:focus, .field input:focus, .field textarea:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand);}
  .field textarea{resize:none; min-height:64px;}
  .field-row{display:flex; gap:10px;}
  .field-row > .field{flex:1;}
  .field-static{ background:var(--bg); border-radius:10px; padding:12px; font-weight:700; font-size:15px; color:var(--brand); }
  .helper{font-size:11.5px; color:var(--text-3); margin-top:5px;}

  .time-picker-btn{
    width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 14px;
    border-radius:10px; border:1.5px solid var(--border); background:#fff; font-size:14px; font-weight:700;
    color:var(--text); cursor:pointer; font-family:'Inter',sans-serif;
  }
  .time-picker-btn svg{color:var(--text-3);}
  .time-picker-btn:active{background:var(--brand-tint); border-color:var(--brand);}

  .segmented{display:flex; background:var(--bg); border-radius:10px; padding:3px; margin:0 16px 14px;}
  .segmented button{ flex:1; padding:9px; border:none; background:transparent; border-radius:8px; font-weight:700; font-size:13px; color:var(--text-2); cursor:pointer; font-family:'Inter',sans-serif; }
  .segmented button.active{background:#fff; color:var(--text); box-shadow:var(--shadow-1);}

  .subtabs{display:flex; gap:6px; padding:12px 16px 0;}
  .subtab{ flex:1; text-align:center; padding:10px 6px; border-radius:10px; font-weight:700; font-size:12.5px; cursor:pointer; color:var(--text-2); background:var(--card); border:1px solid var(--border); }
  .subtab.active{background:var(--brand); color:#fff; border-color:var(--brand);}

  .month-nav{display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px;}
  .month-nav .mn-label{font-size:16px; font-weight:800; font-family:'Poppins',sans-serif;}
  .month-nav-btns{display:flex; gap:6px;}
  .month-nav button{background:var(--card); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .cal-grid{padding:0 12px;}
  .cal-dow-row{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:6px;}
  .cal-dow-row div{font-size:10.5px; font-weight:700; color:var(--text-3);}
  .cal-week{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px;}
  .cal-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
  .cal-day .num-wrap{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; position:relative; }
  .cal-day.blank{cursor:default;}
  .cal-day.approved .num-wrap{background:var(--positive-bg); color:var(--positive); border:1.5px solid var(--positive);}
  .cal-day.sentback .num-wrap{background:var(--critical-bg); color:var(--critical); border:1.5px solid var(--critical);}
  .cal-day.awaiting .num-wrap{border:1.5px dashed var(--neutral); color:var(--text-2);}
  .cal-day.picked .num-wrap{background:var(--brand); color:#fff;}
  .cal-day .infodot{position:absolute; bottom:1px; width:5px; height:5px; border-radius:50%; background:var(--info-dot);}
  .cal-day.today .num-wrap{box-shadow:0 0 0 1.5px var(--brand) inset;}

  .legend{display:flex; flex-wrap:wrap; gap:10px 14px; padding:10px 16px 4px;}
  .legend-item{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--text-2);}
  .legend-swatch{width:12px; height:12px; border-radius:50%; flex:0 0 auto;}
  .legend-swatch.approved{background:var(--positive-bg); border:1.5px solid var(--positive);}
  .legend-swatch.sentback{background:var(--critical-bg); border:1.5px solid var(--critical);}
  .legend-swatch.awaiting{border:1.5px dashed var(--neutral);}
  .legend-swatch.info{background:var(--info-dot); border:none; width:6px; height:6px;}

  .link-row{display:flex; justify-content:space-between; padding:10px 16px 14px;}
  .link-btn{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--brand); background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif;}

  .sheet-overlay{ position:absolute; inset:0; background:rgba(20,28,24,.45); z-index:60; opacity:0; pointer-events:none; transition:opacity .22s ease; display:flex; align-items:flex-end; }
  .sheet-overlay.open{opacity:1; pointer-events:auto;}
  .sheet{ width:100%; max-height:88%; background:var(--bg); border-radius:24px 24px 0 0; overflow:hidden; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1); box-shadow:0 -10px 30px rgba(0,0,0,.2); }
  .sheet-overlay.open .sheet{transform:translateY(0%);}
  .sheet-handle{width:36px; height:4px; background:#D5DBD8; border-radius:3px; margin:10px auto 2px;}
  .sheet-header{ display:flex; align-items:center; justify-content:space-between; padding:10px 16px 12px; background:var(--bg); border-bottom:1px solid var(--border); }
  .sheet-header h3{font-size:16px; font-weight:700; font-family:'Poppins',sans-serif;}
  .sheet-header button{background:var(--card); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-2);}
  .sheet-body{padding:16px; overflow-y:auto; font-family:'Inter',sans-serif;}
  .sheet-footer{padding:12px 16px 18px; background:var(--card); border-top:1px solid var(--border);}

  .balance-pill-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0;}
  .balance-pill-row + .balance-pill-row{border-top:1px solid var(--border);}
  .balance-pill-row .bp-name{font-size:13px; font-weight:700;}
  .balance-pill-row .bp-val{font-size:14px; font-weight:800; color:var(--brand);}

  .accordion-toggle{display:flex; align-items:center; justify-content:space-between; padding:12px 0; cursor:pointer; font-size:13px; font-weight:700; color:var(--text);}
  .accordion-body{padding-bottom:10px;}
  .accordion-body.hidden{display:none;}
  .mini-stat-row{display:flex; justify-content:space-between; padding:6px 0; font-size:12.5px;}
  .mini-stat-row .msl{color:var(--text-3); font-weight:600;}
  .mini-stat-row .msv{font-weight:800;}

  .day-chip-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .day-chip{ display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--border); border-radius:10px; padding:11px 13px; cursor:pointer; }
  .day-chip .dc-left .dc-date{font-size:13px; font-weight:700;}
  .day-chip .dc-left .dc-meta{font-size:11.5px; color:var(--text-3); margin-top:1px;}
  .day-chip .dc-chevron{color:var(--text-3);}

  .toast{ position:absolute; left:16px; right:16px; bottom:96px; background:#1E2A26; color:#fff; padding:13px 16px; border-radius:12px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px; box-shadow:0 8px 20px rgba(0,0,0,.25); z-index:90; transform:translateY(20px); opacity:0; pointer-events:none; transition:all .25s ease; font-family:'Inter',sans-serif; }
  .toast.show{transform:translateY(0); opacity:1;}
  .toast svg{flex:0 0 auto; color:#7CFFA0;}

  .team-row{display:flex; align-items:center; gap:12px; padding:11px 0;}
  .team-row + .team-row{border-top:1px solid var(--border);}
  .team-row .t-avatar{width:36px; height:36px; border-radius:50%; background:var(--brand-tint); color:var(--brand); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12.5px;}
  .team-row .t-name{font-size:13px; font-weight:700;}
  .team-row .t-dates{font-size:11.5px; color:var(--text-3); margin-top:1px;}

  .kv-card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px;}
  .kv-row{display:flex; justify-content:space-between; padding:6px 0; font-size:13px;}
  .kv-row .kl{color:var(--text-3); font-weight:600;}
  .kv-row .kv{font-weight:700;}

  .req-tab-row{display:flex; gap:6px; padding:2px 16px 12px;}
  .req-tab{flex:1; text-align:center; padding:8px; border-radius:9px; font-size:12px; font-weight:700; background:var(--card); border:1px solid var(--border); color:var(--text-2); cursor:pointer;}
  .req-tab.active{background:var(--text); color:#fff; border-color:var(--text);}

  /* Android-style spinner time picker */
  .spinner-wrap{padding:10px 0 4px;}
  .spinner-title{font-size:13.5px; font-weight:700; text-align:center; margin-bottom:16px; font-family:'Poppins',sans-serif;}
  .spinner-cols{display:flex; justify-content:center; align-items:center; gap:8px; position:relative; height:160px;}
  .spinner-highlight{position:absolute; left:6px; right:6px; top:60px; height:40px; background:var(--brand-tint); border-radius:10px; pointer-events:none; z-index:0; border-top:1.5px solid var(--brand); border-bottom:1.5px solid var(--brand);}
  .spinner-col{width:62px; height:160px; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; position:relative; z-index:1;}
  .spinner-col::-webkit-scrollbar{display:none;}
  .spinner-col-pad{height:60px;}
  .spinner-item{height:40px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; color:var(--text-3); scroll-snap-align:center; font-variant-numeric:tabular-nums;}
  .spinner-colon{font-size:20px; font-weight:800; color:var(--text); z-index:1;}
  .spinner-ampm{width:54px;}
</style>
</head>

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
// Build the key from LOCAL date parts. Using toISOString() here would convert to
// UTC and shift the date by a day in timezones east/west of GMT (e.g. IST +5:30).
function fmtISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function startOfWeek(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r; }
function sameDate(a,b){ return fmtISO(a)===fmtISO(b); }
function fmtHuman(d){ return `${DOW[d.getDay()]}, ${MON[d.getMonth()].slice(0,3)} ${d.getDate()}`; }
function fmtRange(a,b){ if(sameDate(a,b)) return fmtHuman(a); return `${fmtHuman(a)} – ${fmtHuman(b)}`; }
function daysLabel(hours){ const d = Math.round((hours/8)*10)/10; return `${d.toFixed(1)} ${d===1?'Day':'Days'}`; }

function calcHours(inT,outT){
  if(!inT||!outT) return 0;
  const [ih,im]=inT.split(':').map(Number), [oh,om]=outT.split(':').map(Number);
  let mins = (oh*60+om)-(ih*60+im);
  if(mins<0) mins+=24*60;
  return mins/60;
}

function saveEntryFromDraft(){
  const dISO = entryDraft.dateISO;
  const hours = calcHours(entryDraft.in, entryDraft.out);
  if(!entries[dISO]) entries[dISO]=[];
  if(entryDraft.entryId){

  const val = entryDraft[which] || '08:00';

  const ampm = h24>=12 ? 'PM':'AM';
  let h12 = h24%12; if(h12===0) h12=12;
  const minuteRounded = Math.round(m/5)*5 % 60;
  const hourIdx = h12-1;
  const minIdx = minuteRounded/5;
  const ampmIdx = ampm==='AM'?0:1;
  document.getElementById('sheetTitle').textContent = which==='in' ? 'Set Time In' : 'Set Time Out';
  document.getElementById('sheetBody').innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner-title">Scroll to select time</div>
      <div class="spinner-cols">
        <div class="spinner-highlight"></div>

        <div class="spinner-colon">:</div>
        ${buildSpinnerCol('sp_min', Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0')))}
        <div class="spinner-col spinner-ampm" id="sp_ampm">
          <div class="spinner-col-pad"></div>
          <div class="spinner-item">AM</div>
          <div class="spinner-item">PM</div>
          <div class="spinner-col-pad"></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `
    <div class="btn-row" style="padding:0;">
      <button class="btn-secondary" onclick="cancelTimeSpinner()">Cancel</button>
      <button class="btn-primary" onclick="confirmTimeSpinner()">Done</button>
    </div>
  `;
  requestAnimationFrame(()=>{
    setSpinnerScroll('sp_hour', hourIdx);
    setSpinnerScroll('sp_min', minIdx);
    setSpinnerScroll('sp_ampm', ampmIdx);
  });
}
function cancelTimeSpinner(){ sheetAddEntry({dateISO:entryDraft.dateISO, entryId:entryDraft.entryId}); }
function confirmTimeSpinner(){
  const hourIdx = Math.min(Math.max(readSpinnerIndex('sp_hour'),0),11);
  const minIdx = Math.min(Math.max(readSpinnerIndex('sp_min'),0),11);
  const ampmIdx = Math.min(Math.max(readSpinnerIndex('sp_ampm'),0),1);
  const hour12 = hourIdx+1;
  const minute = minIdx*5;

  entryDraft[spinnerWhich] = `${String(hour24).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;

function monthAnchor(){ return new Date(TODAY.getFullYear(), TODAY.getMonth()+state.todMonthOffset, 1); }
function monthMatrix(anchor){
  const year=anchor.getFullYear(), month=anchor.getMonth();
  const firstDow = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(year,month,d));
  while(cells.length%7!==0) cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  return weeks;
}
function statusForDate(iso){ for(const r of toRequests){ if(r.days.some(dd=>dd.date===iso)) return r.status; } return null; }
function requestForDate(iso){ return toRequests.find(r=>r.days.some(dd=>dd.date===iso)); }

function selectionCount(){
  if(state.todSelMode==='range'){ return (state.todRangeStart && state.todRangeEnd) ? daysBetween(state.todRangeStart,state.todRangeEnd) : 0; }
  return state.todSelectedDays.length;

function canContinue(){ return selectionCount()>0; }
function daysBetween(a,b){ const da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00'); return Math.max(1, Math.round((db-da)/86400000)+1); }
function renderCalDay(d){
  if(!d) return `<div class="cal-day blank"></div>`;
  const iso = fmtISO(d);
  const status = statusForDate(iso);
  const isPicked = state.todSelectedDays.includes(iso);
  const isToday = sameDate(d,TODAY);
  const hasInfo = !!HOLIDAYS[iso];
  let cls='';
  if(isPicked) cls='picked'; else if(status) cls=status;
  return `<div class="cal-day ${cls} ${isToday?'today':''}" onclick="toggleDay('${iso}')" title="${HOLIDAYS[iso]||''}">
    <div class="num-wrap">${d.getDate()}</div>
    ${hasInfo?'<div class="infodot"></div>':''}
  </div>`;
}
function toggleDay(iso){
  const status = statusForDate(iso);
  if(status){ openManageEntryFromDate(iso); return; }
  const i = state.todSelectedDays.indexOf(iso);
  if(i>-1) state.todSelectedDays.splice(i,1); else state.todSelectedDays.push(iso);
  document.getElementById('screenContent').innerHTML = screenTimeOff();
}

function selectedDatesList(){
  if(state.todSelMode==='range'){

    const list=[]; let cur=new Date(state.todRangeStart+'T00:00:00'); const end=new Date(state.todRangeEnd+'T00:00:00');
    while(cur<=end){ list.push(fmtISO(cur)); cur=addDays(cur,1); }
    return list;
  }
  return [...state.todSelectedDays].sort();
}

  document.getElementById('sheetTitle').textContent='Time Off Entries';
  document.getElementById('sheetBody').innerHTML = `
    <div class="kv-card">
      <div class="kv-row"><span class="kl">Request Amount</span><span class="kv">${daysLabel(r.days.reduce((s,d)=>s+d.hours,0))}</span></div>
      <div class="kv-row"><span class="kl">Status</span><span class="kv"><span class="badge ${r.status}">${statusLabel(r.status)}</span></span></div>
      <div class="kv-row"><span class="kl">Request Dates</span><span class="kv">${fmtRange(new Date(r.start+'T00:00:00'), new Date(r.end+'T00:00:00'))}</span></div>
      <div class="kv-row"><span class="kl">Type of Time Off</span><span class="kv">${r.type}</span></div>
      <div class="kv-row"><span class="kl">Duration per Day</span><span class="kv">${r.dailyHours} Hours</span></div>
    </div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `
    <div class="btn-row" style="padding:0 0 0;">
      <button class="btn-danger-outline" onclick="cancelTimeOff('${r.id}')">Cancel Time Off</button>
      <button class="btn-primary" onclick="openEditIndividualDays('${r.id}')">Edit</button>
    </div>
  `;
}
function cancelTimeOff(id){
  toRequests = toRequests.filter(r=>r.id!==id);
  closeSheet();
  document.getElementById('screenContent').innerHTML = screenTimeOff();
  toast('Time off cancelled · removed from calendar','success');
}
function openEditIndividualDays(id){ openSheet('editIndividualDays', {reqId:id}); }
function sheetEditIndividualDays(ctx){
  const r = toRequests.find(x=>x.id===ctx.reqId);
  document.getElementById('sheetTitle').textContent='Edit Time Off';
  const totalHours = r.days.reduce((s,d)=>s+d.hours,0);
  const bal = BALANCES.find(b=>b.plan.toLowerCase().includes(r.type.toLowerCase())) || {plan:r.type, hours:0};
  document.getElementById('sheetBody').innerHTML = `
    <div class="kv-card" style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:12.5px; font-weight:700; color:var(--text-2);">Total Request Time Off Days</span>
      <span style="font-size:15px; font-weight:800; color:var(--brand);">${daysLabel(totalHours)}</span>
    </div>
    <div class="section-title" style="padding:2px 0 8px;">Individual Days</div>
    <div class="day-chip-list">
      ${r.days.map((d,i)=>`
        <div class="day-chip" onclick="openEditRequestDay('${r.id}', ${i})">
          <div class="dc-left">
            <div class="dc-date">${fmtHuman(new Date(d.date+'T00:00:00'))}</div>
            <div class="dc-meta">${d.type} · ${d.hours} Hours (Daily)</div>
          </div>
          <div class="dc-chevron">${svg('chevronRight',16)}</div>
        </div>
      `).join('')}
    </div>
    <div class="mini-stat-row" style="margin-top:12px;"><span class="msl">Available Balance</span><span class="msv">${daysLabel(bal.hours)}</span></div>
    <div class="mini-stat-row"><span class="msl">Remaining Balance (after this request)</span><span class="msv">${daysLabel(bal.hours-totalHours)}</span></div>
  `;
  document.getElementById('sheetFooter').style.display='block';
  document.getElementById('sheetFooter').innerHTML = `<button class="btn-primary" onclick="submitEditedRequest('${r.id}')">Submit Request</button>`;
}
function openEditRequestDay(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  const d = r.days[idx];
  const bal = BALANCES.find(b=>b.plan.toLowerCase().includes(d.type.toLowerCase())) || {plan:d.type, hours:0};
  const remaining = bal.hours - r.days.reduce((s,dd)=>s+dd.hours,0) + d.hours;
  document.getElementById('sheetBody').innerHTML = `
    <button class="link-btn" style="margin-bottom:10px;" onclick="sheetEditIndividualDays({reqId:'${reqId}'})">${svg('chevronLeft',14)} Back to all days</button>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div style="font-size:13px; font-weight:800;">${fmtHuman(new Date(d.date+'T00:00:00'))}</div>
      <button class="link-btn" style="color:var(--negative);" onclick="deleteRequestDay('${reqId}', ${idx})">${svg('trash',14)} Delete</button>
    </div>
    <div class="field">
      <label>Type of Time Off</label>
      <select id="rd_type" onchange="previewDayBalance('${reqId}', ${idx})">${TIMEOFF_TYPES.map(t=>`<option ${t===d.type?'selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="field">
      <label>Hours</label>
      <input type="number" id="rd_hours" min="0" max="24" step="0.5" value="${d.hours}" onchange="previewDayBalance('${reqId}', ${idx})">
    </div>
    <div class="mini-stat-row"><span class="msl">Available Balance</span><span class="msv" id="rd_avail">${daysLabel(bal.hours)}</span></div>
    <div class="mini-stat-row"><span class="msl">Remaining Balance</span><span class="msv" id="rd_remain">${daysLabel(remaining)}</span></div>
  `;
  document.getElementById('sheetFooter').innerHTML = `<button class="btn-primary" onclick="saveRequestDay('${reqId}', ${idx})">Save Day</button>`;
}
function previewDayBalance(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  const type = document.getElementById('rd_type').value;
  const hours = parseFloat(document.getElementById('rd_hours').value)||0;
  const bal = BALANCES.find(b=>b.plan.toLowerCase().includes(type.toLowerCase())) || {plan:type, hours:0};
  const otherTotal = r.days.reduce((s,dd,i)=> i===idx? s : s+dd.hours, 0);
  document.getElementById('rd_avail').textContent = daysLabel(bal.hours);
  document.getElementById('rd_remain').textContent = daysLabel(bal.hours-otherTotal-hours);
}
function saveRequestDay(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  r.days[idx] = {...r.days[idx], type:document.getElementById('rd_type').value, hours:parseFloat(document.getElementById('rd_hours').value)||0};
  sheetEditIndividualDays({reqId});
}
function deleteRequestDay(reqId, idx){
  const r = toRequests.find(x=>x.id===reqId);
  r.days.splice(idx,1);
  if(r.days.length===0){ toRequests = toRequests.filter(x=>x.id!==reqId); closeSheet(); document.getElementById('screenContent').innerHTML=screenTimeOff(); toast('All days removed · request deleted','success'); return; }
  r.start = r.days[0].date; r.end = r.days[r.days.length-1].date;
  sheetEditIndividualDays({reqId});
}
function submitEditedRequest(reqId){
  const r = toRequests.find(x=>x.id===reqId);
  r.status = 'awaiting';
  closeSheet();
  document.getElementById('screenContent').innerHTML = screenTimeOff();
  toast('Edits submitted for approval','success');
}

/* ================= PROFILE ================= */
function screenProfile(){
  return `
    <div class="section">
      <div class="card" style="display:flex; align-items:center; gap:14px;">
        <div class="avatar" style="width:52px; height:52px; font-size:17px;">SM</div>
        <div>
          <div style="font-weight:800; font-size:15px;">Sarah Mitchell</div>
          <div style="font-size:12.5px; color:var(--text-3);">Retail Associate · CC-100</div>
          <div style="font-size:12.5px; color:var(--text-3);">Signed in via SSO</div>
        </div>
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <div class="section-title">Preferences</div>
      <div class="card" style="padding:6px 16px;">
        ${profileRow('bell','Notifications')}
        ${profileRow('user','Personal Information')}
        ${profileRow('info','Help &amp; Support')}
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <button class="btn-secondary" onclick="doSignOut()" style="display:flex; align-items:center; justify-content:center; gap:8px; color:var(--negative); border-color:var(--negative);">${svg('logout',16)} Sign Out</button>
    </div>
  `;
}
function profileRow(icon,label){
  return `<div class="list-row">
    <div class="lr-icon" style="background:var(--bg); color:var(--text-2);">${svg(icon,16)}</div>
    <div class="lr-body"><div class="lr-title">${label}</div></div>
    ${svg('chevronRight',16)}
  </div>`;
}

/* ================= Sheet control ================= */
const SHEETS = {
  addEntry: sheetAddEntry,
  checkoutMeal: sheetCheckoutMeal,
  timeOffDetails: sheetTimeOffDetails,
  balances: sheetBalances,
  teams: sheetTeams,
  actionsMenu: sheetActionsMenu,
  editTimeOff: sheetEditTimeOff,
  editIndividualDays: sheetEditIndividualDays,
};
function openSheet(name, ctx={}){
  state.sheet = name; state.sheetCtx = ctx;
  document.getElementById('sheetFooter').style.display='none';
  document.getElementById('sheetFooter').innerHTML='';
  SHEETS[name](ctx);
  document.getElementById('sheetOverlay').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  state.sheet=null;
  entryDraft=null;
}
document.getElementById('sheetOverlay').addEventListener('click', (e)=>{ if(e.target.id==='sheetOverlay') closeSheet(); });

/* ================= Toast ================= */
let toastTimer=null;
function toast(msg, kind='success'){
  const el = document.getElementById('toast');
  const iconName = kind==='success' ? 'checkCircle' : kind==='warn' ? 'info' : 'info';
  el.innerHTML = `${svg(iconName,18)}<span>${msg}</span>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

render();
</script>
